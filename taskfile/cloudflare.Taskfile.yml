# ==============================================================================
# File: taskfile/cloudflare.Taskfile.yml
# Purpose:
#   cloudflare domain entrypoints for the homelab repository.
# Notes:
#   - This file preserves the production structure and is ready for domain-specific tasks.
#   - No destructive action is implemented without explicit future configuration.
# ==============================================================================

version: '3'

silent: true

tasks:
  help:
    desc: Show cloudflare tasks
    cmds:
      - |
        cat <<'HELP'
        cloudflare tasks:
          task cloudflare:help
          task cloudflare:report
        HELP

  report:
    desc: Show cloudflare domain status
    cmds:
      - echo 'cloudflare domain scaffold is present. Add configured tasks when variables are defined.'
