# ==============================================================================
# File: taskfile/packer.Taskfile.yml
# Purpose:
#   packer domain entrypoints for the homelab repository.
# Notes:
#   - This file preserves the production structure and is ready for domain-specific tasks.
#   - No destructive action is implemented without explicit future configuration.
# ==============================================================================

version: '3'

silent: true

tasks:
  help:
    desc: Show packer tasks
    cmds:
      - |
        cat <<'HELP'
        packer tasks:
          task packer:help
          task packer:report
        HELP

  report:
    desc: Show packer domain status
    cmds:
      - echo 'packer domain scaffold is present. Add configured tasks when variables are defined.'
