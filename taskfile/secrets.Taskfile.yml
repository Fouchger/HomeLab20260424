# ================================================================
# File: taskfile/secrets.Taskfile.yml
# Purpose:
#   Production-ready secrets management tasks for the homelab.
#
# Scope:
#   - Ubuntu and Debian only
#   - age and SOPS bootstrap for repository-managed secrets
#   - OpenBao local runtime with TLS and Raft storage
#   - Interactive operator workflows for create, update, view, edit
#   - Backup, restore preparation, rotation, destroy, and purge flows
#
# Notes:
#   - This file is intended to be included by the root Taskfile under the
#     `secrets:` namespace.
#   - Example usage:
#       task secrets:design
#       task secrets:prepare
#       task secrets:bootstrap
#       task secrets:secret:update SECRET_GROUP=passwords SECRET_KEY=GITHUB_TOKEN SECRET_VALUE=example
# ================================================================

version: '3'

silent: true

vars:
  TASKFILE: '{{.TASKFILE | default "taskfile/secrets.Taskfile.yml"}}'

  AGE_ADMIN_KEY: '{{.AGE_DIR}}/admin.key'
  AGE_ADMIN_PUB: '{{.AGE_DIR}}/admin.pub'
  AGE_RECOVERY_KEY: '{{.AGE_DIR}}/recovery.key'
  AGE_RECOVERY_PUB: '{{.AGE_DIR}}/recovery.pub'
  AGE_ROTATION_MARKER_FILE: '{{.AGE_DIR}}/.rotation-in-progress'

  SOPS_CONFIG_FILE: '{{.ROOT_DIR}}/.sops.yaml'
  SOPS_EXAMPLES_DIR: '{{.SECRETS_DIR}}/sops/examples'
  SOPS_SAMPLE_FILE: '{{.SOPS_EXAMPLES_DIR}}/bootstrap.enc.yaml'
  SOPS_SAMPLE_PLAIN_FILE: '{{.TMP_DIR}}/bootstrap.yaml'

  PASSWORDS_EXAMPLE_ENV_FILE: '{{.PASSWORDS_DIR}}/passwords.example.env'
  PASSWORDS_RUNTIME_ENV_FILE: '{{.PASSWORDS_DIR}}/.runtime.env'
  PASSWORDS_SAMPLE_PLAIN_FILE: '{{.TMP_DIR}}/passwords.sample.env'

  SECRETS_EDITOR: '{{default "" .SECRETS_EDITOR}}'

  OPENBAO_RUNTIME_SYSTEM_DIR: '{{default "/var/lib/openbao" .OPENBAO_RUNTIME_SYSTEM_DIR}}'
  OPENBAO_DATA_DIR_ABS: '{{.OPENBAO_RUNTIME_SYSTEM_DIR}}/data'
  OPENBAO_INSTALL_DIR: '{{default "/etc/openbao" .OPENBAO_INSTALL_DIR}}'
  OPENBAO_INSTALL_TLS_LINK: '{{default "/opt/openbao/tls" .OPENBAO_INSTALL_TLS_LINK}}'

  OPENBAO_DIR: '{{.SECRETS_DIR}}/openbao'
  OPENBAO_BOOTSTRAP_DIR: '{{.OPENBAO_DIR}}/bootstrap'
  OPENBAO_RUNTIME_DIR: '{{.OPENBAO_DIR}}/runtime'
  OPENBAO_POLICIES_DIR: '{{.OPENBAO_DIR}}/policies'
  OPENBAO_RENDERED_DIR: '{{.OPENBAO_DIR}}/rendered'
  OPENBAO_TLS_DIR: '{{.OPENBAO_DIR}}/tls'
  OPENBAO_CA_DIR: '{{.OPENBAO_TLS_DIR}}/ca'
  OPENBAO_SERVER_TLS_DIR: '{{.OPENBAO_TLS_DIR}}/server'
  OPENBAO_TRANSIT_DIR: '{{.OPENBAO_DIR}}/transit'
  OPENBAO_DATA_DIR: '{{.OPENBAO_RUNTIME_DIR}}/data'

  OPENBAO_CONFIG_FILE: '{{.OPENBAO_RENDERED_DIR}}/openbao.hcl'
  OPENBAO_CLI_ENV_FILE: '{{.OPENBAO_RENDERED_DIR}}/openbao.env'
  OPENBAO_RUNTIME_ENV_RENDERED_FILE: '{{.OPENBAO_RENDERED_DIR}}/openbao.runtime.env'
  OPENBAO_RUNTIME_ENV_INSTALLED_FILE: '{{.OPENBAO_INSTALL_DIR}}/openbao.env'
  OPENBAO_POLICY_AUTOUNSEAL: '{{.OPENBAO_POLICIES_DIR}}/autounseal.hcl'
  OPENBAO_STATUS_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/status.json'
  OPENBAO_INIT_ENC_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/init.enc.json'
  OPENBAO_KEYS_ENC_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/unseal-keys.enc.json'
  OPENBAO_ROOT_TOKEN_ENC_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/root-token.enc.json'
  OPENBAO_TRANSIT_BOOTSTRAP_ENC_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/transit-autounseal.enc.json'
  OPENBAO_SYSTEMD_RENDERED_FILE: '{{.OPENBAO_RENDERED_DIR}}/openbao.service'
  OPENBAO_SYSTEMD_INSTALLED_FILE: '/etc/systemd/system/openbao.service'
  OPENBAO_VENDOR_SYSTEMD_FILE: '/usr/lib/systemd/system/openbao.service'
  OPENBAO_RAFT_SNAPSHOT_FILE: '{{.BACKUP_DIR}}/openbao-raft-latest.snap'
  OPENBAO_RAFT_SNAPSHOT_TIMESTAMPED_FILE: '{{.BACKUP_DIR}}/openbao-raft-{{now | date "20060102T150405Z07:00" | replace ":" ""}}.snap'
  OPENBAO_OFFLINE_BUNDLE_FILE: '{{.BACKUP_DIR}}/openbao-offline-bundle-{{now | date "20060102T150405Z07:00" | replace ":" ""}}.tar.gz'
  OPENBAO_DR_PRECHECK_FILE: '{{.DR_DIR}}/preflight.json'
  OPENBAO_AUDIT_FILE: '{{.AUDIT_DIR}}/openbao-audit-{{now | date "20060102T150405Z07:00" | replace ":" ""}}.json'
  OPENBAO_AUDIT_LATEST_FILE: '{{.AUDIT_DIR}}/openbao-audit-latest.json'
  OPENBAO_SERVER_CERT_FILE: '{{.OPENBAO_SERVER_TLS_DIR}}/server.cert.pem'
  OPENBAO_SERVER_KEY_FILE: '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem'

  OPENBAO_SCHEME: '{{default "https" .OPENBAO_SCHEME}}'
  OPENBAO_HOST: '{{default "127.0.0.1" .OPENBAO_HOST}}'
  OPENBAO_PORT: '{{default "8200" .OPENBAO_PORT}}'
  OPENBAO_CLUSTER_PORT: '{{default "8201" .OPENBAO_CLUSTER_PORT}}'
  OPENBAO_ADDR: '{{.OPENBAO_SCHEME}}://{{.OPENBAO_HOST}}:{{.OPENBAO_PORT}}'
  OPENBAO_API_ADDR: '{{.OPENBAO_ADDR}}'
  OPENBAO_CLUSTER_ADDR: 'https://{{.OPENBAO_HOST}}:{{.OPENBAO_CLUSTER_PORT}}'
  OPENBAO_DNS_ALT_NAMES: '{{default "localhost" .OPENBAO_DNS_ALT_NAMES}}'
  OPENBAO_IP_ALT_NAMES: '{{default "127.0.0.1" .OPENBAO_IP_ALT_NAMES}}'
  OPENBAO_INIT_SHARES: '{{default "5" .OPENBAO_INIT_SHARES}}'
  OPENBAO_INIT_THRESHOLD: '{{default "3" .OPENBAO_INIT_THRESHOLD}}'
  OPENBAO_AUTOUNSEAL_KEY_NAME: '{{default "autounseal" .OPENBAO_AUTOUNSEAL_KEY_NAME}}'
  OPENBAO_AUTOUNSEAL_MOUNT_PATH: '{{default "transit/" .OPENBAO_AUTOUNSEAL_MOUNT_PATH}}'
  OPENBAO_TRANSIT_SEAL_ADDR: '{{default "" .OPENBAO_TRANSIT_SEAL_ADDR}}'
  OPENBAO_SYSTEMD_UNIT: '{{default "openbao" .OPENBAO_SYSTEMD_UNIT}}'
  OPENBAO_RELEASES_URL: 'https://github.com/openbao/openbao/releases/latest'
  OPENBAO_TRANSIT_TLS_SERVER_NAME: '{{default "" .OPENBAO_TRANSIT_TLS_SERVER_NAME}}'
  VAULT_CLIENT_TIMEOUT: '{{default "300s" .VAULT_CLIENT_TIMEOUT}}'
  CERT_RENEW_DAYS: '{{default "825" .CERT_RENEW_DAYS}}'
  CERT_RENEW_RESTART: '{{default "true" .CERT_RENEW_RESTART}}'

  ROTATE_KEYS_FORCE: '{{default "false" .ROTATE_KEYS_FORCE}}'
  TAKE_BACKUP_BEFORE_DESTROY: '{{default "true" .TAKE_BACKUP_BEFORE_DESTROY}}'
  CONFIRM_DESTROY: '{{default "false" .CONFIRM_DESTROY}}'
  PURGE_PACKAGES: '{{default "true" .PURGE_PACKAGES}}'

tasks:
  tasklist:
    internal: true
    desc: Show the available secrets tasks
    cmds:
      - task --taskfile {{.TASKFILE}} --list

  help:
    desc: Show the main secrets tasks
    cmds:
      - |
        cat <<'EOF'
        Main secrets tasks:
          task secrets:design
          task secrets:prepare
          task secrets:bootstrap
          task secrets:report

        Secret operations:
          task secrets:secret:create SECRET_GROUP=<group> SECRET_KEY=<key> SECRET_VALUE=<value>
          task secrets:secret:update SECRET_GROUP=<group> SECRET_KEY=<key> SECRET_VALUE=<value>
          task secrets:secret:view SECRET_GROUP=<group> SECRET_KEY=<key>
          task secrets:view:group SECRET_GROUP=<group>
          task secrets:view:all
          task secrets:edit FILE=state/secrets/<group>/<file>

        Runtime and operations:
          task secrets:openbao:status
          task secrets:openbao:restart:validate
          task secrets:backup:offline
          task secrets:backup:raft
          task secrets:ops:rotate:keys
          task secrets:ops:renew:certs
          task secrets:ops:audit

        Destructive:
          task secrets:destroy CONFIRM_DESTROY=true
          task secrets:purge CONFIRM_DESTROY=true
        EOF

  design:
    desc: Show the secrets design, tools, inputs, and paths
    cmds:
      - |
        cat <<EOF
        ================================================================
        Secrets design
        ================================================================
        Repository source of truth:
          - age keys under: {{.AGE_DIR}}
          - SOPS config: {{.SOPS_CONFIG_FILE}}
          - encrypted secret files under: {{.SECRETS_DIR}}

        Runtime secrets service:
          - OpenBao config: {{.OPENBAO_INSTALL_DIR}}
          - OpenBao data: {{.OPENBAO_DATA_DIR_ABS}}
          - OpenBao address: {{.OPENBAO_ADDR}}

        Required software:
          - age
          - sops
          - jq
          - curl
          - openssl
          - tar
          - sudo
          - systemd tools
          - OpenBao

        Required operator inputs:
          - OPERATOR_NAME
          - OPERATOR_EMAIL

        Recommended run order:
          1. task secrets:prepare
          2. task secrets:bootstrap
          3. task secrets:report

        Secret group convention:
          - passwords
          - certificates
          - tokens
          - apps
          - custom groups as needed
        EOF

  init:
    internal: true
    desc: Create the standard secrets directory structure
    status:
      - test -d '{{.SECRETS_DIR}}'
      - test -d '{{.TMP_DIR}}'
      - test -d '{{.AGE_DIR}}'
      - test -d '{{.PASSWORDS_DIR}}'
      - test -d '{{.OPENBAO_BOOTSTRAP_DIR}}'
      - test -d '{{.OPENBAO_RENDERED_DIR}}'
      - test -d '{{.OPENBAO_SERVER_TLS_DIR}}'
      - test -d '{{.BACKUP_DIR}}'
      - test -d '{{.DR_DIR}}'
      - test -d '{{.AUDIT_DIR}}'
      - test -d '{{.AGE_ARCHIVE_DIR}}'
    cmds:
      - |
        # ================================================================
        # Task: init
        # Purpose:
        #   Create the standard secrets directory structure.
        # ================================================================
        set -eu
        mkdir -p \
          '{{.CONFIG_DIR}}' \
          '{{.SECRETS_DIR}}' \
          '{{.TMP_DIR}}' \
          '{{.BACKUP_DIR}}' \
          '{{.DR_DIR}}' \
          '{{.AUDIT_DIR}}' \
          '{{.AGE_DIR}}' \
          '{{.AGE_ARCHIVE_DIR}}' \
          '{{.PASSWORDS_DIR}}' \
          '{{.SOPS_EXAMPLES_DIR}}' \
          '{{.OPENBAO_BOOTSTRAP_DIR}}' \
          '{{.OPENBAO_RUNTIME_DIR}}' \
          '{{.OPENBAO_POLICIES_DIR}}' \
          '{{.OPENBAO_RENDERED_DIR}}' \
          '{{.OPENBAO_CA_DIR}}' \
          '{{.OPENBAO_SERVER_TLS_DIR}}' \
          '{{.OPENBAO_TRANSIT_DIR}}' \
          '{{.OPENBAO_DATA_DIR}}'
        chmod 700 \
          '{{.SECRETS_DIR}}' \
          '{{.TMP_DIR}}' \
          '{{.AGE_DIR}}' \
          '{{.PASSWORDS_DIR}}' \
          '{{.BACKUP_DIR}}' \
          '{{.DR_DIR}}' \
          '{{.AUDIT_DIR}}' \
          '{{.AGE_ARCHIVE_DIR}}' \
          '{{.OPENBAO_BOOTSTRAP_DIR}}' \
          '{{.OPENBAO_RUNTIME_DIR}}' \
          '{{.OPENBAO_POLICIES_DIR}}' \
          '{{.OPENBAO_CA_DIR}}' \
          '{{.OPENBAO_SERVER_TLS_DIR}}' \
          '{{.OPENBAO_TRANSIT_DIR}}'

  operator:ensure:
    internal: true
    desc: Ensure OPERATOR_NAME and OPERATOR_EMAIL exist in state/config/.env
    deps: [init]
    cmds:
      - |
        # ================================================================
        # Task: operator:ensure
        # Purpose:
        #   Ensure operator identity exists in state/config/.env.
        # Notes:
        #   - Uses interactive shell prompts only when values are missing.
        #   - Fails clearly when no TTY is available.
        # ================================================================
        set -eu
        . '{{.TASK_HELPERS_FILE}}'

        operator_name="$(get_env_value '{{.CONFIG_ENV_FILE}}' OPERATOR_NAME || true)"
        operator_email="$(get_env_value '{{.CONFIG_ENV_FILE}}' OPERATOR_EMAIL || true)"

        if [ -z "$operator_name" ]; then
          operator_name="$(prompt_if_missing_env_key '{{.CONFIG_ENV_FILE}}' OPERATOR_NAME 'Enter operator name: ')"
        fi

        if [ -z "$operator_email" ]; then
          operator_email="$(prompt_if_missing_env_key '{{.CONFIG_ENV_FILE}}' OPERATOR_EMAIL 'Enter operator email: ')"
        fi

        if [ -z "$operator_name" ]; then
          echo 'OPERATOR_NAME cannot be empty.' >&2
          exit 1
        fi

        if [ -z "$operator_email" ]; then
          echo 'OPERATOR_EMAIL cannot be empty.' >&2
          exit 1
        fi

        ensure_env_key_value '{{.CONFIG_ENV_FILE}}' OPERATOR_NAME "$operator_name"
        ensure_env_key_value '{{.CONFIG_ENV_FILE}}' OPERATOR_EMAIL "$operator_email"

        echo '--- operator ---'
        cat '{{.CONFIG_ENV_FILE}}'

  tools:check:apt:
    internal: true
    desc: Ensure the platform is Ubuntu or Debian with apt available
    cmds:
      - |
        # ================================================================
        # Task: tools:check:apt
        # Purpose:
        #   Validate Ubuntu or Debian package tooling.
        # ================================================================
        set -eu
        command -v apt-get >/dev/null 2>&1
        command -v dpkg >/dev/null 2>&1
        os_id="$(. /etc/os-release && printf '%s' "$ID")"
        case "$os_id" in
          ubuntu|debian) ;;
          *)
            echo "Unsupported distribution: ${os_id}. Only Ubuntu and Debian are supported." >&2
            exit 1
            ;;
        esac

  tools:install:base:
    internal: true
    desc: Install base packages required for secrets automation
    deps: [tools:check:apt]
    status:
      - command -v age >/dev/null 2>&1
      - command -v jq >/dev/null 2>&1
      - command -v curl >/dev/null 2>&1
      - command -v openssl >/dev/null 2>&1
      - command -v awk >/dev/null 2>&1
      - command -v sudo >/dev/null 2>&1
      - command -v tar >/dev/null 2>&1
    cmds:
      - |
        # ================================================================
        # Task: tools:install:base
        # Purpose:
        #   Install the baseline operating system packages.
        # ================================================================
        set -eu
        sudo apt-get update
        sudo apt-get install -y \
          age \
          jq \
          curl \
          openssl \
          sed \
          gawk \
          ca-certificates \
          gnupg \
          lsb-release \
          tar

  tools:install:sops:
    internal: true
    desc: Install SOPS from the latest GitHub release package
    deps: [tools:check:apt]
    status:
      - command -v sops >/dev/null 2>&1
    cmds:
      - |
        # ================================================================
        # Task: tools:install:sops
        # Purpose:
        #   Install SOPS from the latest upstream release package.
        # ================================================================
        set -eu
        arch="$(dpkg --print-architecture)"
        version_url='https://github.com/getsops/sops/releases/latest'
        version="$(curl -fsSLI -o /dev/null -w '%{url_effective}' "$version_url" | sed 's#.*/tag/##; s#^v##')"
        pkg="sops_${version}_${arch}.deb"
        url="https://github.com/getsops/sops/releases/download/v${version}/${pkg}"
        tmp_pkg="$(mktemp -p /var/tmp sops.XXXXXX.deb)"
        trap 'rm -f "$tmp_pkg"' EXIT
        chmod 644 "$tmp_pkg"
        curl -fL "$url" -o "$tmp_pkg"
        sudo apt-get install -y "$tmp_pkg"

  tools:install:openbao:
    internal: true
    desc: Install the latest OpenBao release on Ubuntu or Debian
    deps: [tools:check:apt]
    status:
      - command -v bao >/dev/null 2>&1
      - test -d '{{.OPENBAO_INSTALL_DIR}}'
    vars:
      ARCH:
        sh: |
          case "$(uname -m)" in
            x86_64|amd64) echo amd64 ;;
            aarch64|arm64) echo arm64 ;;
            *) echo unsupported ;;
          esac
      OPENBAO_VERSION:
        sh: |
          curl -fsSLI -o /dev/null -w '%{url_effective}' '{{.OPENBAO_RELEASES_URL}}' | sed 's#.*/tag/v##'
      PKG_FILE: 'openbao_{{.OPENBAO_VERSION}}_linux_{{.ARCH}}.deb'
      PKG_URL: 'https://github.com/openbao/openbao/releases/download/v{{.OPENBAO_VERSION}}/openbao_{{.OPENBAO_VERSION}}_linux_{{.ARCH}}.deb'
    preconditions:
      - sh: '[ "{{.ARCH}}" != "unsupported" ]'
        msg: 'Unsupported architecture. Only amd64 and arm64 are supported.'
    cmds:
      - |
        # ================================================================
        # Task: tools:install:openbao
        # Purpose:
        #   Install or refresh OpenBao and standardise runtime paths.
        # ================================================================
        set -eu

        installed_version=''
        if command -v bao >/dev/null 2>&1; then
          installed_version="$(bao version 2>/dev/null | sed -n 's/^OpenBao v\([0-9][^ ,]*\).*/\1/p' | head -n 1 || true)"
        fi

        if [ -n "$installed_version" ] && [ "$installed_version" = '{{.OPENBAO_VERSION}}' ]; then
          echo "OpenBao ${installed_version} is already installed"
        else
          tmp_pkg="$(mktemp -p /var/tmp openbao.XXXXXX.deb)"
          trap 'rm -f "$tmp_pkg"' EXIT
          chmod 644 "$tmp_pkg"
          curl -fL '{{.PKG_URL}}' -o "$tmp_pkg"
          sudo apt-get update
          sudo apt-get install -y "$tmp_pkg"
        fi

        sudo mkdir -p '{{.OPENBAO_INSTALL_DIR}}'
        sudo mkdir -p "$(dirname '{{.OPENBAO_INSTALL_TLS_LINK}}')"
        sudo rm -rf '{{.OPENBAO_INSTALL_TLS_LINK}}'
        sudo ln -s '{{.OPENBAO_INSTALL_DIR}}' '{{.OPENBAO_INSTALL_TLS_LINK}}'

  tools:check:
    internal: true
    desc: Validate required tooling
    deps: [init]
    cmds:
      - |
        # ================================================================
        # Task: tools:check
        # Purpose:
        #   Validate the full toolchain for secrets operations.
        # ================================================================
        set -eu
        missing=0
        for tool in age-keygen age sops jq curl openssl sed awk sudo tar systemctl journalctl bao; do
          if ! command -v "$tool" >/dev/null 2>&1; then
            echo "Missing required tool: $tool" >&2
            missing=1
          fi
        done
        [ "$missing" -eq 0 ]
        echo 'Tooling check completed successfully'

  tools:check:systemd:
    internal: true
    desc: Validate required systemd tooling
    cmds:
      - |
        # ================================================================
        # Task: tools:check:systemd
        # Purpose:
        #   Validate systemd tooling for OpenBao service operations.
        # ================================================================
        set -eu
        command -v systemctl >/dev/null 2>&1
        command -v journalctl >/dev/null 2>&1

  tools:install:
    internal: true
    desc: Install all required tools for secrets automation
    cmds:
      - task: tools:install:base
      - task: tools:install:sops
      - task: tools:install:openbao
      - task: tools:check

  age:generate:
    internal: true
    desc: Generate standard admin and recovery age identities if missing
    deps: [init]
    status:
      - test -f '{{.AGE_ADMIN_KEY}}'
      - test -f '{{.AGE_RECOVERY_KEY}}'
      - test -f '{{.AGE_KEYS_FILE}}'
    cmds:
      - |
        # ================================================================
        # Task: age:generate
        # Purpose:
        #   Create the standard admin and recovery age identities.
        # ================================================================
        set -eu

        if [ ! -f '{{.AGE_ADMIN_KEY}}' ]; then
          age-keygen -o '{{.AGE_ADMIN_KEY}}' >/dev/null
          age-keygen -y '{{.AGE_ADMIN_KEY}}' > '{{.AGE_ADMIN_PUB}}'
          chmod 600 '{{.AGE_ADMIN_KEY}}'
          chmod 644 '{{.AGE_ADMIN_PUB}}'
          echo "Public key: $(cat '{{.AGE_ADMIN_PUB}}')"
        fi

        if [ ! -f '{{.AGE_RECOVERY_KEY}}' ]; then
          age-keygen -o '{{.AGE_RECOVERY_KEY}}' >/dev/null
          age-keygen -y '{{.AGE_RECOVERY_KEY}}' > '{{.AGE_RECOVERY_PUB}}'
          chmod 600 '{{.AGE_RECOVERY_KEY}}'
          chmod 644 '{{.AGE_RECOVERY_PUB}}'
          echo "Public key: $(cat '{{.AGE_RECOVERY_PUB}}')"
        fi

        cat '{{.AGE_ADMIN_KEY}}' '{{.AGE_RECOVERY_KEY}}' > '{{.AGE_KEYS_FILE}}'
        chmod 600 '{{.AGE_KEYS_FILE}}'
        echo "Age identities are ready under {{.AGE_DIR}}"

  age:show:recipients:
    internal: true
    desc: Show public age recipients used by SOPS
    cmds:
      - |
        set -eu
        echo "admin=$(cat '{{.AGE_ADMIN_PUB}}')"
        echo "recovery=$(cat '{{.AGE_RECOVERY_PUB}}')"

  age:backup:bundle:
    internal: true
    desc: Create a tar.gz backup bundle of existing age identities
    preconditions:
      - sh: '[ -d "{{.AGE_DIR}}" ]'
        msg: 'Age directory not found. Nothing to back up.'
    cmds:
      - |
        # ================================================================
        # Task: age:backup:bundle
        # Purpose:
        #   Create an offline backup bundle for age identities.
        # ================================================================
        set -eu
        archive="{{.BACKUP_DIR}}/age-$(date -u +%Y%m%dT%H%M%SZ).tar.gz"
        mkdir -p '{{.BACKUP_DIR}}'
        tar -C '{{.SECRETS_DIR}}' -czf "$archive" age
        chmod 600 "$archive"
        echo "Created $archive"

  sops:config:render:
    internal: true
    desc: Render the repository SOPS configuration
    deps: [age:generate]
    cmds:
      - |
        # ================================================================
        # Task: sops:config:render
        # Purpose:
        #   Render .sops.yaml for files under state/secrets.
        # Notes:
        #   - Supports both relative and absolute repository paths.
        # ================================================================
        set -eu
        admin="$(cat '{{.AGE_ADMIN_PUB}}')"
        recovery="$(cat '{{.AGE_RECOVERY_PUB}}')"
        cat > '{{.SOPS_CONFIG_FILE}}' <<EOF
        # ================================================================
        # File: .sops.yaml
        # Purpose:
        #   SOPS creation rules for secrets stored under state/secrets.
        # ================================================================
        creation_rules:
          - path_regex: ^(.*/)?state/secrets/.*\.(ya?ml|json|env|ini|txt|conf)$
            age: >-
              ${admin},${recovery}
        EOF

  sops:sample:create:
    internal: true
    desc: Create an example encrypted bootstrap secret file if missing
    deps: [sops:config:render]
    status:
      - test -f '{{.SOPS_SAMPLE_FILE}}'
    cmds:
      - |
        # ================================================================
        # Task: sops:sample:create
        # Purpose:
        #   Create an example encrypted SOPS file.
        # ================================================================
        set -eu
        cat > '{{.SOPS_SAMPLE_PLAIN_FILE}}' <<EOF
        # ================================================================
        # File: bootstrap.yaml
        # Purpose:
        #   Example bootstrap secret payload for SOPS testing.
        # ================================================================
        bootstrap:
          created_by: task
          created_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          note: replace-this-with-real-values
        EOF
        trap 'rm -f "{{.SOPS_SAMPLE_PLAIN_FILE}}"' EXIT
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override '{{.SOPS_SAMPLE_FILE}}' --input-type yaml --output-type yaml '{{.SOPS_SAMPLE_PLAIN_FILE}}' > '{{.SOPS_SAMPLE_FILE}}'
        chmod 600 '{{.SOPS_SAMPLE_FILE}}'

  passwords:sample:create:
    internal: true
    desc: Create an example encrypted passwords env file if missing
    deps: [sops:config:render]
    cmds:
      - |
        # ================================================================
        # Task: passwords:sample:create
        # Purpose:
        #   Create the encrypted passwords source of truth and a safe
        #   plaintext example file documenting expected keys.
        # ================================================================
        set -eu
        if [ -f '{{.PASSWORDS_ENC_ENV_FILE}}' ]; then
          exit 0
        fi

        cat > '{{.PASSWORDS_SAMPLE_PLAIN_FILE}}' <<EOF
        # ================================================================
        # File: passwords.sample.env
        # Purpose:
        #   Example managed passwords file for homelab workflows.
        # ================================================================
        GITHUB_TOKEN=replace-me
        OPENBAO_ROOT_TOKEN=replace-me
        OPENBAO_TRANSIT_AUTOUNSEAL_TOKEN=replace-me
        EOF

        trap 'rm -f "{{.PASSWORDS_SAMPLE_PLAIN_FILE}}"' EXIT
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override '{{.PASSWORDS_ENC_ENV_FILE_REL}}' --input-type dotenv --output-type dotenv '{{.PASSWORDS_SAMPLE_PLAIN_FILE}}' > '{{.PASSWORDS_ENC_ENV_FILE}}'
        chmod 600 '{{.PASSWORDS_ENC_ENV_FILE}}'

        cat > '{{.PASSWORDS_EXAMPLE_ENV_FILE}}' <<EOF
        # ================================================================
        # File: passwords.example.env
        # Purpose:
        #   Safe example showing the expected environment keys.
        # ================================================================
        GITHUB_TOKEN=replace-me
        OPENBAO_ROOT_TOKEN=replace-me
        OPENBAO_TRANSIT_AUTOUNSEAL_TOKEN=replace-me
        EOF
        chmod 644 '{{.PASSWORDS_EXAMPLE_ENV_FILE}}'

  sops:bootstrap:
    internal: true
    desc: Bootstrap age and SOPS standards and create example encrypted secrets
    cmds:
      - task: sops:sample:create
      - task: passwords:sample:create

  sops:edit:
    internal: true
    desc: Edit a SOPS-encrypted file. Usage task secrets:sops:edit FILE=state/secrets/...
    preconditions:
      - sh: '[ -n "{{.FILE}}" ]'
        msg: 'Provide FILE=state/secrets/...'
      - sh: '[ -f "{{.FILE}}" ]'
        msg: 'The requested encrypted file does not exist.'
    cmds:
      - SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops '{{.FILE}}'

  sops:encrypt:
    internal: true
    desc: Encrypt a plaintext file in place
    preconditions:
      - sh: '[ -n "{{.FILE}}" ]'
        msg: 'Provide FILE=state/secrets/...'
      - sh: '[ -n "{{.PLAIN}}" ]'
        msg: 'Provide PLAIN=path/to/plaintext-file'
      - sh: '[ -f "{{.PLAIN}}" ]'
        msg: 'Plaintext source file does not exist.'
    cmds:
      - |
        set -eu
        mkdir -p "$(dirname '{{.FILE}}')"
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override '{{.FILE}}' '{{.PLAIN}}' > '{{.FILE}}'
        chmod 600 '{{.FILE}}'

  sops:decrypt:
    internal: true
    desc: Decrypt a SOPS file to stdout or OUT=path
    preconditions:
      - sh: '[ -n "{{.FILE}}" ]'
        msg: 'Provide FILE=state/secrets/...'
      - sh: '[ -f "{{.FILE}}" ]'
        msg: 'Encrypted source file does not exist.'
    cmds:
      - |
        set -eu
        if [ -n '{{.OUT}}' ]; then
          mkdir -p "$(dirname '{{.OUT}}')"
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.FILE}}' > '{{.OUT}}'
          chmod 600 '{{.OUT}}'
        else
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.FILE}}'
        fi

  prepare:
    desc: Prepare the repo-side secrets standards and OpenBao runtime
    cmds:
      - task: init
      - task: operator:ensure
      - task: tools:install
      - task: sops:bootstrap
      - task: openbao:prepare:runtime

  bootstrap:
    desc: Run the full end-to-end secrets setup
    cmds:
      - task: prepare
      - task: openbao:bootstrap:standalone
      - task: editor:select
      - task: report
      - |
        # ================================================================
        # Task: bootstrap
        # Purpose:
        #   Run the recommended first-time secrets bootstrap flow.
        # ================================================================
        set -eu

        cat <<'EOF'
        Secrets bootstrap complete.

        The local secrets tooling is ready, OpenBao is initialised,
        and the preferred editor is configured.
        EOF

  openbao:tls:ca:init:
    internal: true
    desc: Generate a local CA for OpenBao TLS if missing
    deps: [init]
    status:
      - test -f '{{.OPENBAO_CA_DIR}}/ca.key.pem'
      - test -f '{{.OPENBAO_CA_DIR}}/ca.cert.pem'
    cmds:
      - |
        # ================================================================
        # Task: openbao:tls:ca:init
        # Purpose:
        #   Generate the local certificate authority used for OpenBao TLS.
        # ================================================================
        set -eu
        openssl genrsa -out '{{.OPENBAO_CA_DIR}}/ca.key.pem' 4096
        openssl req -x509 -new -nodes \
          -key '{{.OPENBAO_CA_DIR}}/ca.key.pem' \
          -sha256 -days 3650 \
          -subj '/CN=homelab-openbao-ca' \
          -out '{{.OPENBAO_CA_DIR}}/ca.cert.pem'
        chmod 600 '{{.OPENBAO_CA_DIR}}/ca.key.pem'
        chmod 644 '{{.OPENBAO_CA_DIR}}/ca.cert.pem'

  openbao:tls:server:init:
    internal: true
    desc: Generate a TLS server certificate for OpenBao if missing
    deps: [openbao:tls:ca:init]
    status:
      - test -f '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem'
      - test -f '{{.OPENBAO_SERVER_TLS_DIR}}/server.cert.pem'
    cmds:
      - |
        set -eu
        dns_tmp='{{.TMP_DIR}}/dns_sans.txt'
        ip_tmp='{{.TMP_DIR}}/ip_sans.txt'
        host_short="$(hostname -s 2>/dev/null || echo '{{.OPENBAO_HOST}}')"
        host_fqdn="$(hostname -f 2>/dev/null || echo "$host_short")"
        primary_ip="$(hostname -I 2>/dev/null | awk '{print $1}' || true)"

        trap 'rm -f "$dns_tmp" "$ip_tmp" "{{.OPENBAO_SERVER_TLS_DIR}}/server.csr.pem"' EXIT

        {
          printf '%s\n' '{{.OPENBAO_DNS_ALT_NAMES}}'
          printf '%s\n' "$host_short"
          printf '%s\n' "$host_fqdn"
          printf '%s\n' '{{.OPENBAO_HOST}}'
          printf '%s\n' 'localhost'
        } | tr ',' '\n' | sed 's/^ *//; s/ *$//' | awk 'NF > 0 && !seen[$0]++ {print}' > "$dns_tmp"

        {
          printf '%s\n' '{{.OPENBAO_IP_ALT_NAMES}}'
          printf '%s\n' '127.0.0.1'
          if [ -n "$primary_ip" ]; then
            printf '%s\n' "$primary_ip"
          fi
        } | tr ',' '\n' | sed 's/^ *//; s/ *$//' | awk 'NF > 0 && !seen[$0]++ {print}' > "$ip_tmp"

        {
          echo '[req]'
          echo 'default_bits = 4096'
          echo 'prompt = no'
          echo 'default_md = sha256'
          echo 'distinguished_name = dn'
          echo 'req_extensions = req_ext'
          echo 'x509_extensions = v3_server'
          echo
          echo '[dn]'
          echo "CN = $host_fqdn"
          echo
          echo '[req_ext]'
          echo 'subjectAltName = @alt_names'
          echo
          echo '[v3_server]'
          echo 'subjectAltName = @alt_names'
          echo 'basicConstraints = CA:FALSE'
          echo 'keyUsage = digitalSignature, keyEncipherment'
          echo 'extendedKeyUsage = serverAuth'
          echo
          echo '[alt_names]'
          dns_index=1
          while IFS= read -r dns; do
            echo "DNS.${dns_index} = ${dns}"
            dns_index=$((dns_index + 1))
          done < "$dns_tmp"
          ip_index=1
          while IFS= read -r ip; do
            echo "IP.${ip_index} = ${ip}"
            ip_index=$((ip_index + 1))
          done < "$ip_tmp"
        } > '{{.OPENBAO_SERVER_TLS_DIR}}/server-openssl.cnf'

        openssl genrsa -out '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem' 4096
        openssl req -new \
          -key '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem' \
          -out '{{.OPENBAO_SERVER_TLS_DIR}}/server.csr.pem' \
          -config '{{.OPENBAO_SERVER_TLS_DIR}}/server-openssl.cnf'
        openssl x509 -req \
          -in '{{.OPENBAO_SERVER_TLS_DIR}}/server.csr.pem' \
          -CA '{{.OPENBAO_CA_DIR}}/ca.cert.pem' \
          -CAkey '{{.OPENBAO_CA_DIR}}/ca.key.pem' \
          -CAcreateserial \
          -out '{{.OPENBAO_SERVER_TLS_DIR}}/server.cert.pem' \
          -days '{{.CERT_RENEW_DAYS}}' \
          -sha256 \
          -extensions v3_server \
          -extfile '{{.OPENBAO_SERVER_TLS_DIR}}/server-openssl.cnf'

        chmod 600 '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem'
        chmod 644 '{{.OPENBAO_SERVER_TLS_DIR}}/server.cert.pem'

        if ! openssl x509 -in '{{.OPENBAO_SERVER_TLS_DIR}}/server.cert.pem' -noout -text | grep -A5 'Subject Alternative Name' | grep -Eq 'DNS:localhost|IP Address:127\.0\.0\.1'; then
          echo 'Generated certificate does not contain expected SAN entries.' >&2
          exit 1
        fi

        echo "OpenBao TLS key and self-signed certificate have been generated in '{{.OPENBAO_INSTALL_TLS_LINK}}'."

  openbao:policy:render:
    internal: true
    desc: Render standard OpenBao policy for transit auto-unseal
    deps: [init]
    cmds:
      - |
        # ================================================================
        # Task: openbao:policy:render
        # Purpose:
        #   Render the policy required for transit-backed auto-unseal.
        # ================================================================
        set -eu
        cat > '{{.OPENBAO_POLICY_AUTOUNSEAL}}' <<EOF
        # ================================================================
        # File: autounseal.hcl
        # Purpose:
        #   Policy for a token used to manage transit-backed auto-unseal.
        # ================================================================
        path "{{.OPENBAO_AUTOUNSEAL_MOUNT_PATH}}encrypt/{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}" {
          capabilities = ["update"]
        }

        path "{{.OPENBAO_AUTOUNSEAL_MOUNT_PATH}}decrypt/{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}" {
          capabilities = ["update"]
        }

        path "{{.OPENBAO_AUTOUNSEAL_MOUNT_PATH}}keys/{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}" {
          capabilities = ["read"]
        }
        EOF
        chmod 600 '{{.OPENBAO_POLICY_AUTOUNSEAL}}'

  openbao:config:render:
    internal: true
    desc: Render standalone OpenBao configuration and environment files
    deps:
      - openbao:tls:server:init
      - openbao:policy:render
    cmds:
      - |
        # ================================================================
        # Task: openbao:config:render
        # Purpose:
        #   Render the standalone OpenBao server and CLI configuration.
        # ================================================================
        set -eu

        seal_enabled='false'
        transit_token=''

        if [ -n '{{.OPENBAO_TRANSIT_SEAL_ADDR}}' ] && [ '{{.OPENBAO_TRANSIT_SEAL_ADDR}}' != '{{.OPENBAO_ADDR}}' ] && [ -f '{{.OPENBAO_TRANSIT_BOOTSTRAP_ENC_FILE}}' ]; then
          seal_enabled='true'
          transit_token="$(SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.OPENBAO_TRANSIT_BOOTSTRAP_ENC_FILE}}' | jq -r '.token')"
        fi

        cat > '{{.OPENBAO_CONFIG_FILE}}' <<EOF
        # ================================================================
        # File: openbao.hcl
        # Purpose:
        #   Standalone OpenBao server configuration using integrated Raft
        #   storage with TLS enabled for API and cluster traffic.
        # ================================================================
        ui = true
        api_addr = "{{.OPENBAO_API_ADDR}}"
        cluster_addr = "{{.OPENBAO_CLUSTER_ADDR}}"

        listener "tcp" {
          address = "0.0.0.0:{{.OPENBAO_PORT}}"
          cluster_address = "0.0.0.0:{{.OPENBAO_CLUSTER_PORT}}"
          tls_disable = 0
          tls_cert_file = "{{.OPENBAO_INSTALL_DIR}}/server.cert.pem"
          tls_key_file = "{{.OPENBAO_INSTALL_DIR}}/server.key.pem"
          tls_client_ca_file = "{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem"
        }

        storage "raft" {
          path = "{{.OPENBAO_DATA_DIR_ABS}}"
          node_id = "{{.OPENBAO_HOST}}"
        }

        telemetry {
          disable_hostname = true
          prometheus_retention_time = "24h"
        }
        EOF

        if [ "$seal_enabled" = 'true' ]; then
          cat >> '{{.OPENBAO_CONFIG_FILE}}' <<EOF

        seal "transit" {
          address = "{{.OPENBAO_TRANSIT_SEAL_ADDR}}"
          token = "${transit_token}"
          key_name = "{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}"
          mount_path = "{{.OPENBAO_AUTOUNSEAL_MOUNT_PATH}}"
          tls_ca_cert = "{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem"
        EOF
          if [ -n '{{.OPENBAO_TRANSIT_TLS_SERVER_NAME}}' ]; then
            printf '%s\n' "  tls_server_name = \"{{.OPENBAO_TRANSIT_TLS_SERVER_NAME}}\"" >> '{{.OPENBAO_CONFIG_FILE}}'
          fi
          cat >> '{{.OPENBAO_CONFIG_FILE}}' <<EOF
        }
        EOF
        fi

        cat > '{{.OPENBAO_CLI_ENV_FILE}}' <<EOF
        # ================================================================
        # File: openbao.env
        # Purpose:
        #   Standard OpenBao CLI environment variables for this homelab.
        # ================================================================
        export BAO_ADDR='{{.OPENBAO_ADDR}}'
        export BAO_CACERT='{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem'
        export BAO_FORMAT='json'
        export VAULT_CLIENT_TIMEOUT='{{.VAULT_CLIENT_TIMEOUT}}'
        EOF

        cat > '{{.OPENBAO_RUNTIME_ENV_RENDERED_FILE}}' <<EOF
        # ================================================================
        # File: openbao.runtime.env
        # Purpose:
        #   Runtime environment consumed by systemd for OpenBao.
        # ================================================================
        VAULT_ADDR={{.OPENBAO_ADDR}}
        VAULT_CACERT={{.OPENBAO_INSTALL_DIR}}/ca.cert.pem
        VAULT_CLIENT_TIMEOUT={{.VAULT_CLIENT_TIMEOUT}}
        EOF

        chmod 640 '{{.OPENBAO_CONFIG_FILE}}' '{{.OPENBAO_RUNTIME_ENV_RENDERED_FILE}}'
        chmod 600 '{{.OPENBAO_CLI_ENV_FILE}}'

  openbao:install:config:
    internal: true
    desc: Install rendered OpenBao configuration into /etc/openbao
    deps: [openbao:config:render]
    cmds:
      - |
        # ================================================================
        # Task: openbao:install:config
        # Purpose:
        #   Install rendered OpenBao runtime assets into /etc/openbao.
        # ================================================================
        set -eu
        sudo mkdir -p '{{.OPENBAO_INSTALL_DIR}}'
        sudo install -m 640 '{{.OPENBAO_CONFIG_FILE}}' '{{.OPENBAO_INSTALL_DIR}}/openbao.hcl'
        sudo install -m 640 '{{.OPENBAO_RUNTIME_ENV_RENDERED_FILE}}' '{{.OPENBAO_RUNTIME_ENV_INSTALLED_FILE}}'
        sudo install -m 644 '{{.OPENBAO_CA_DIR}}/ca.cert.pem' '{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem'
        sudo install -m 644 '{{.OPENBAO_SERVER_TLS_DIR}}/server.cert.pem' '{{.OPENBAO_INSTALL_DIR}}/server.cert.pem'
        sudo install -m 640 '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem' '{{.OPENBAO_INSTALL_DIR}}/server.key.pem'
        sudo rm -rf '{{.OPENBAO_INSTALL_TLS_LINK}}'
        sudo ln -s '{{.OPENBAO_INSTALL_DIR}}' '{{.OPENBAO_INSTALL_TLS_LINK}}'

  openbao:systemd:render:
    internal: true
    desc: Render a hardened systemd unit for standalone OpenBao
    deps: [openbao:install:config]
    cmds:
      - |
        # ================================================================
        # Task: openbao:systemd:render
        # Purpose:
        #   Render the hardened systemd unit used to run OpenBao.
        # ================================================================
        set -eu
        cat > '{{.OPENBAO_SYSTEMD_RENDERED_FILE}}' <<EOF
        # ================================================================
        # File: openbao.service
        # Purpose:
        #   systemd unit for a standalone OpenBao runtime.
        # ================================================================
        [Unit]
        Description=OpenBao secrets management server
        Documentation=https://openbao.org/docs/
        After=network-online.target
        Wants=network-online.target

        [Service]
        Type=simple
        User=openbao
        Group=openbao
        EnvironmentFile=-{{.OPENBAO_RUNTIME_ENV_INSTALLED_FILE}}
        ExecStart=/usr/bin/bao server -config={{.OPENBAO_INSTALL_DIR}}/openbao.hcl
        ExecReload=/bin/kill --signal HUP $$MAINPID
        Restart=on-failure
        RestartSec=5
        UMask=0077
        LimitNOFILE=65536
        LimitMEMLOCK=infinity
        AmbientCapabilities=CAP_IPC_LOCK
        CapabilityBoundingSet=CAP_IPC_LOCK
        LockPersonality=true
        NoNewPrivileges=true
        PrivateTmp=true
        ProtectSystem=full
        ProtectHome=read-only
        ProtectControlGroups=true
        ProtectKernelLogs=true
        ProtectKernelModules=true
        ProtectKernelTunables=true
        ProtectProc=invisible
        ProcSubset=pid
        ReadWritePaths={{.OPENBAO_INSTALL_DIR}} {{.OPENBAO_DATA_DIR_ABS}}
        SystemCallArchitectures=native
        WorkingDirectory={{.OPENBAO_DATA_DIR_ABS}}

        [Install]
        WantedBy=multi-user.target
        EOF
        chmod 600 '{{.OPENBAO_SYSTEMD_RENDERED_FILE}}'

  openbao:systemd:install:
    internal: true
    desc: Install the OpenBao systemd unit and ensure runtime permissions are correct
    deps:
      - tools:check:systemd
      - openbao:systemd:render
    cmds:
      - |
        # ================================================================
        # Task: openbao:systemd:install
        # Purpose:
        #   Install and enable the hardened OpenBao systemd unit with
        #   deterministic ownership and permissions.
        # ================================================================
        set -eu

        unit_name='{{.OPENBAO_SYSTEMD_UNIT}}'
        unit_file="/etc/systemd/system/${unit_name}.service"

        if ! getent group openbao >/dev/null 2>&1; then
          sudo groupadd --system openbao
        fi

        if ! id openbao >/dev/null 2>&1; then
          sudo useradd \
            --system \
            --home '{{.OPENBAO_DATA_DIR_ABS}}' \
            --shell /usr/sbin/nologin \
            --gid openbao \
            openbao
        fi

        sudo mkdir -p '{{.OPENBAO_INSTALL_DIR}}'
        sudo mkdir -p '{{.OPENBAO_RUNTIME_SYSTEM_DIR}}'
        sudo mkdir -p '{{.OPENBAO_DATA_DIR_ABS}}'

        sudo install -m 644 '{{.OPENBAO_SYSTEMD_RENDERED_FILE}}' "${unit_file}"

        sudo chown -R root:openbao '{{.OPENBAO_INSTALL_DIR}}'
        sudo chmod 750 '{{.OPENBAO_INSTALL_DIR}}'

        sudo chmod 640 '{{.OPENBAO_INSTALL_DIR}}/openbao.hcl'
        sudo chmod 640 '{{.OPENBAO_RUNTIME_ENV_INSTALLED_FILE}}'
        sudo chmod 640 '{{.OPENBAO_INSTALL_DIR}}/server.key.pem'
        sudo chmod 644 '{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem'
        sudo chmod 644 '{{.OPENBAO_INSTALL_DIR}}/server.cert.pem'

        sudo chown root:openbao '{{.OPENBAO_RUNTIME_SYSTEM_DIR}}'
        sudo chmod 750 '{{.OPENBAO_RUNTIME_SYSTEM_DIR}}'

        sudo chown -R openbao:openbao '{{.OPENBAO_DATA_DIR_ABS}}'
        sudo find '{{.OPENBAO_DATA_DIR_ABS}}' -type d -exec chmod 750 {} +
        sudo find '{{.OPENBAO_DATA_DIR_ABS}}' -type f -exec chmod 640 {} + || true

        sudo systemctl daemon-reexec
        sudo systemctl daemon-reload
        sudo systemctl enable "${unit_name}.service"

        fragment_path="$(systemctl show -p FragmentPath --value "${unit_name}.service")"
        if [ "$fragment_path" != "${unit_file}" ]; then
          echo "Expected FragmentPath ${unit_file} but found ${fragment_path}" >&2
          exit 1
        fi

  openbao:prepare:runtime:
    internal: true
    desc: Render and install the complete OpenBao runtime
    cmds:
      - task: openbao:systemd:install

  openbao:start:
    internal: true
    desc: Start the OpenBao systemd service and wait until the API is reachable
    deps: [openbao:prepare:runtime]
    cmds:
      - sudo systemctl reset-failed '{{.OPENBAO_SYSTEMD_UNIT}}.service' || true
      - sudo systemctl start '{{.OPENBAO_SYSTEMD_UNIT}}.service'
      - |
        # ================================================================
        # Task: openbao:start
        # Purpose:
        #   Start the local OpenBao service and wait until the API is ready.
        # Notes:
        #   - Treat only a live health endpoint or successful bao status as ready.
        #   - Do not use `bao operator init -status` as a readiness signal.
        # ================================================================
        set -eu
        . '{{.OPENBAO_CLI_ENV_FILE}}'

        attempt=0
        max_attempts=60

        while [ "$attempt" -lt "$max_attempts" ]; do
          if ! systemctl is-active '{{.OPENBAO_SYSTEMD_UNIT}}.service' >/dev/null 2>&1; then
            attempt=$((attempt + 1))
            sleep 1
            continue
          fi

          if curl --silent --show-error --fail \
            --cacert '{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem' \
            '{{.OPENBAO_ADDR}}/v1/sys/health?uninitcode=200&sealedcode=200&standbyok=true&perfstandbyok=true' \
            >/dev/null 2>&1; then
            echo 'OpenBao API is reachable'
            exit 0
          fi

          if bao status -format=json >/dev/null 2>&1; then
            echo 'OpenBao API is responding'
            exit 0
          fi

          attempt=$((attempt + 1))
          sleep 1
        done

        echo 'OpenBao API did not become ready in time' >&2
        sudo systemctl --no-pager --full status '{{.OPENBAO_SYSTEMD_UNIT}}.service' || true
        sudo journalctl -u '{{.OPENBAO_SYSTEMD_UNIT}}.service' -n 100 --no-pager || true
        exit 1

  openbao:stop:
    internal: true
    desc: Stop the OpenBao systemd service
    deps: [tools:check:systemd]
    cmds:
      - sudo systemctl stop '{{.OPENBAO_SYSTEMD_UNIT}}.service'

  openbao:restart:
    internal: true
    desc: Restart the OpenBao systemd service
    deps: [tools:check:systemd]
    cmds:
      - sudo systemctl restart '{{.OPENBAO_SYSTEMD_UNIT}}.service'

  openbao:restart:validate:
    desc: Restart OpenBao and validate the service, unit source, and API reachability
    deps: [openbao:prepare:runtime]
    cmds:
      - |
        # ================================================================
        # Task: openbao:restart:validate
        # Purpose:
        #   Restart OpenBao and validate service health afterwards.
        # ================================================================
        set -eu
        sudo systemctl restart '{{.OPENBAO_SYSTEMD_UNIT}}.service'

        fragment_path="$(systemctl show -p FragmentPath --value '{{.OPENBAO_SYSTEMD_UNIT}}.service')"
        if [ "$fragment_path" != '{{.OPENBAO_SYSTEMD_INSTALLED_FILE}}' ]; then
          echo "Unexpected systemd FragmentPath: ${fragment_path}" >&2
          exit 1
        fi

        . '{{.OPENBAO_CLI_ENV_FILE}}'

        attempt=0
        max_attempts=30
        while [ "$attempt" -lt "$max_attempts" ]; do
          if systemctl is-active '{{.OPENBAO_SYSTEMD_UNIT}}.service' >/dev/null 2>&1; then
            if bao status -format=json >/dev/null 2>&1; then
              break
            fi
          fi
          attempt=$((attempt + 1))
          sleep 1
        done

        if ! systemctl is-active '{{.OPENBAO_SYSTEMD_UNIT}}.service' >/dev/null 2>&1; then
          sudo systemctl status '{{.OPENBAO_SYSTEMD_UNIT}}.service' --no-pager -l || true
          sudo journalctl -u '{{.OPENBAO_SYSTEMD_UNIT}}.service' -n 100 --no-pager || true
          exit 1
        fi

        bao status -format=json | jq '{initialized, sealed, type, version, storage_type}'

  openbao:health:
    internal: true
    desc: Check whether the local OpenBao API is reachable and report basic health
    cmds:
      - |
        set -eu
        . '{{.OPENBAO_CLI_ENV_FILE}}'
        curl --silent --show-error --fail \
          --cacert '{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem' \
          '{{.OPENBAO_ADDR}}/v1/sys/health?standbyok=true&perfstandbyok=true' \
          | jq .

  openbao:status:
    desc: Show OpenBao seal and initialisation status
    cmds:
      - |
        set -eu
        . '{{.OPENBAO_CLI_ENV_FILE}}'
        bao status -format=json | tee '{{.OPENBAO_STATUS_FILE}}' | jq .

  openbao:bootstrap:status:
    internal: true
    desc: Show a concise bootstrap readiness and recovery artefact summary
    cmds:
      - |
        set -eu
        echo '--- openbao ---'
        if [ -f '{{.OPENBAO_INIT_ENC_FILE}}' ]; then
          echo 'bootstrap: initialised'
        else
          echo 'bootstrap: not initialised'
        fi

  openbao:init:
    internal: true
    desc: Initialise OpenBao once and persist encrypted bootstrap outputs
    cmds:
      - |
        # ================================================================
        # Task: openbao:init
        # Purpose:
        #   Initialise OpenBao and persist encrypted bootstrap artefacts.
        # ================================================================
        set -eu
        . '{{.OPENBAO_CLI_ENV_FILE}}'

        status_json="$(bao status -format=json 2>/dev/null || true)"
        if [ -n "$status_json" ] && printf '%s' "$status_json" | jq -e '.initialized == true' >/dev/null 2>&1; then
          echo 'OpenBao is already initialised'
          exit 0
        fi

        tmp_init='{{.TMP_DIR}}/openbao-init.json'
        tmp_keys='{{.TMP_DIR}}/openbao-unseal-keys.json'
        tmp_root='{{.TMP_DIR}}/openbao-root-token.json'
        trap 'rm -f "$tmp_init" "$tmp_keys" "$tmp_root"' EXIT

        bao operator init \
          -key-shares='{{.OPENBAO_INIT_SHARES}}' \
          -key-threshold='{{.OPENBAO_INIT_THRESHOLD}}' \
          -format=json > "$tmp_init"

        jq '{unseal_keys_b64: .unseal_keys_b64, unseal_keys_hex: .unseal_keys_hex}' "$tmp_init" > "$tmp_keys"
        jq '{root_token: .root_token}' "$tmp_init" > "$tmp_root"

        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override 'state/secrets/openbao/bootstrap/init.enc.json' --input-type json --output-type json "$tmp_init" > '{{.OPENBAO_INIT_ENC_FILE}}'
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override 'state/secrets/openbao/bootstrap/unseal-keys.enc.json' --input-type json --output-type json "$tmp_keys" > '{{.OPENBAO_KEYS_ENC_FILE}}'
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override 'state/secrets/openbao/bootstrap/root-token.enc.json' --input-type json --output-type json "$tmp_root" > '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}'

        chmod 600 '{{.OPENBAO_INIT_ENC_FILE}}' '{{.OPENBAO_KEYS_ENC_FILE}}' '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}'
      - task: passwords:store:openbao:root

  openbao:unseal:
    internal: true
    desc: Unseal the standalone OpenBao instance using stored encrypted bootstrap keys
    preconditions:
      - sh: '[ -f "{{.OPENBAO_INIT_ENC_FILE}}" ]'
        msg: 'Initialisation artefact not found. Run task secrets:openbao:init first.'
    cmds:
      - |
        set -eu
        . '{{.OPENBAO_CLI_ENV_FILE}}'

        status_json="$(bao status -format=json 2>/dev/null || true)"
        sealed="$(printf '%s' "$status_json" | jq -r '.sealed // "unknown"')"

        if [ "$sealed" = 'false' ]; then
          echo 'OpenBao is already unsealed'
          exit 0
        fi

        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.OPENBAO_INIT_ENC_FILE}}' \
          | jq -r '.unseal_keys_b64[0:{{.OPENBAO_INIT_THRESHOLD}}][]' \
          | while IFS= read -r key; do
              bao operator unseal "$key" >/dev/null
            done

  openbao:login:root:
    internal: true
    desc: Print an export statement for the saved encrypted root token
    preconditions:
      - sh: '[ -f "{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}" ]'
        msg: 'Encrypted root token not found. Initialise OpenBao first.'
    cmds:
      - |
        set -eu
        token="$(SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}' | jq -r '.root_token')"
        echo "export BAO_TOKEN='${token}'"

  openbao:secrets:enable:
    internal: true
    desc: Enable baseline secret engines if not already enabled
    preconditions:
      - sh: '[ -f "{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}" ]'
        msg: 'Encrypted root token not found. Initialise OpenBao first.'
    cmds:
      - |
        set -eu
        . '{{.OPENBAO_CLI_ENV_FILE}}'
        export BAO_TOKEN="$(SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}' | jq -r '.root_token')"
        bao secrets list -format=json | jq -e 'has("kv/")' >/dev/null 2>&1 || bao secrets enable -path=kv kv-v2
        bao secrets list -format=json | jq -e 'has("pki/")' >/dev/null 2>&1 || bao secrets enable pki
        bao secrets list -format=json | jq -e 'has("transit/")' >/dev/null 2>&1 || bao secrets enable transit

  openbao:transit:prepare-autounseal:
    internal: true
    desc: Create a transit key, policy, and orphan token for future external auto-unseal use
    deps: [openbao:secrets:enable]
    cmds:
      - |
        set -eu
        . '{{.OPENBAO_CLI_ENV_FILE}}'
        export BAO_TOKEN="$(SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}' | jq -r '.root_token')"
        bao read -format=json '{{.OPENBAO_AUTOUNSEAL_MOUNT_PATH}}keys/{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}' >/dev/null 2>&1 || bao write -f '{{.OPENBAO_AUTOUNSEAL_MOUNT_PATH}}keys/{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}'
        bao policy read autounseal >/dev/null 2>&1 || bao policy write autounseal '{{.OPENBAO_POLICY_AUTOUNSEAL}}'

        if [ ! -f '{{.OPENBAO_TRANSIT_BOOTSTRAP_ENC_FILE}}' ]; then
          tmp_transit='{{.TMP_DIR}}/transit-autounseal.json'
          trap 'rm -f "$tmp_transit"' EXIT
          token="$(bao token create -orphan -policy=autounseal -format=json | jq -r '.auth.client_token')"
          jq -n \
            --arg token "$token" \
            --arg key_name '{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}' \
            --arg address '{{.OPENBAO_ADDR}}' \
            --arg mount_path '{{.OPENBAO_AUTOUNSEAL_MOUNT_PATH}}' \
            --arg ca_cert '{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem' \
            '{token: $token, key_name: $key_name, address: $address, mount_path: $mount_path, ca_cert: $ca_cert}' > "$tmp_transit"
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override 'state/secrets/openbao/bootstrap/transit-autounseal.enc.json' --input-type json --output-type json "$tmp_transit" > '{{.OPENBAO_TRANSIT_BOOTSTRAP_ENC_FILE}}'
          chmod 600 '{{.OPENBAO_TRANSIT_BOOTSTRAP_ENC_FILE}}'
        fi
      - task: passwords:store:openbao:transit

  openbao:raft:snapshot:save:
    internal: true
    desc: Save a fresh Raft snapshot for disaster recovery and portable backups
    preconditions:
      - sh: '[ -f "{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}" ]'
        msg: 'Encrypted root token not found. Initialise OpenBao first.'
    cmds:
      - |
        set -eu
        . '{{.OPENBAO_CLI_ENV_FILE}}'
        export BAO_TOKEN="$(SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}' | jq -r '.root_token')"
        mkdir -p '{{.BACKUP_DIR}}'
        bao operator raft snapshot save '{{.OPENBAO_RAFT_SNAPSHOT_TIMESTAMPED_FILE}}'
        chmod 600 '{{.OPENBAO_RAFT_SNAPSHOT_TIMESTAMPED_FILE}}'
        cp '{{.OPENBAO_RAFT_SNAPSHOT_TIMESTAMPED_FILE}}' '{{.OPENBAO_RAFT_SNAPSHOT_FILE}}'
        chmod 600 '{{.OPENBAO_RAFT_SNAPSHOT_FILE}}'

  backup:raft:
    desc: Save a fresh OpenBao raft snapshot
    cmds:
      - task: openbao:raft:snapshot:save

  openbao:backup:bundle:
    internal: true
    desc: Create a tar.gz backup bundle of encrypted OpenBao bootstrap artefacts
    cmds:
      - |
        set -eu
        archive='{{.BACKUP_DIR}}/openbao-bootstrap-$(date -u +%Y%m%dT%H%M%SZ).tar.gz'
        snapshot_entry=''
        if [ -f '{{.OPENBAO_RAFT_SNAPSHOT_FILE}}' ]; then
          snapshot_entry="backups/$(basename '{{.OPENBAO_RAFT_SNAPSHOT_FILE}}')"
        fi
        if [ -n "$snapshot_entry" ]; then
          tar -C '{{.SECRETS_DIR}}' -czf "$archive" openbao/bootstrap openbao/tls age "$snapshot_entry"
        else
          tar -C '{{.SECRETS_DIR}}' -czf "$archive" openbao/bootstrap openbao/tls age
        fi
        chmod 600 "$archive"

  backup:offline:
    desc: Create an operator-ready offline recovery bundle
    cmds:
      - |
        set -eu
        mkdir -p '{{.BACKUP_DIR}}' '{{.TMP_DIR}}'

        if [ -d '{{.AGE_DIR}}' ] && find '{{.AGE_DIR}}' -maxdepth 1 -type f | grep -q .; then
          task --taskfile '{{.TASKFILE}}' age:backup:bundle >/dev/null 2>&1 || true
        fi

        if [ -f '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}' ] && [ -f '{{.OPENBAO_CLI_ENV_FILE}}' ] && command -v bao >/dev/null 2>&1; then
          task --taskfile '{{.TASKFILE}}' openbao:raft:snapshot:save >/dev/null 2>&1 || true
        fi

        include_args=''
        add_path() {
          include_args="$include_args $1"
        }

        if [ -d '{{.AGE_DIR}}' ] && find '{{.AGE_DIR}}' -maxdepth 1 -type f | grep -q .; then
          add_path 'age'
        fi
        if [ -d '{{.OPENBAO_BOOTSTRAP_DIR}}' ] && find '{{.OPENBAO_BOOTSTRAP_DIR}}' -type f | grep -q .; then
          add_path 'openbao/bootstrap'
        fi
        if [ -d '{{.OPENBAO_TLS_DIR}}' ] && find '{{.OPENBAO_TLS_DIR}}' -type f | grep -q .; then
          add_path 'openbao/tls'
        fi
        if [ -f '{{.OPENBAO_RAFT_SNAPSHOT_FILE}}' ]; then
          add_path 'backups/$(basename '{{.OPENBAO_RAFT_SNAPSHOT_FILE}}')'
        fi

        if [ -z "$include_args" ]; then
          echo 'No recoverable artefacts found. Skipping offline backup.'
          exit 0
        fi

        tmp_manifest='{{.TMP_DIR}}/offline-bundle-manifest.txt'
        trap 'rm -f "$tmp_manifest"' EXIT
        cat > "$tmp_manifest" <<EOF
        # ================================================================
        # File: offline-bundle-manifest.txt
        # Purpose:
        #   Manifest describing the contents of the portable offline bundle.
        # ================================================================
        generated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        next_action=copy this tar.gz to offline storage away from the host
        EOF

        # shellcheck disable=SC2086
        tar -C '{{.SECRETS_DIR}}' -czf '{{.OPENBAO_OFFLINE_BUNDLE_FILE}}' \
          $include_args \
          '.tmp/'"$(basename "$tmp_manifest")"
        chmod 600 '{{.OPENBAO_OFFLINE_BUNDLE_FILE}}'

  ops:day2:
    desc: Run the standard day-2 operations cycle
    cmds:
      - task: backup:offline
      - task: ops:audit
      - task: openbao:bootstrap:status
      - task: report

  ops:rotate:keys:
    desc: Rotate age identities and rekey SOPS-encrypted files
    deps: [backup:offline]
    cmds:
      - |
        # ================================================================
        # Task: ops:rotate:keys
        # Purpose:
        #   Safely rotate age identities and rekey all SOPS files.
        # ================================================================
        set -eu

        mkdir -p '{{.AGE_ARCHIVE_DIR}}' '{{.TMP_DIR}}'
        archive_stamp="$(date -u +%Y%m%dT%H%M%SZ)"
        archive_dir='{{.AGE_ARCHIVE_DIR}}/'"${archive_stamp}"
        marker_file='{{.AGE_ROTATION_MARKER_FILE}}'

        if [ -f "$marker_file" ]; then
          echo "Rotation marker ${marker_file} already exists." >&2
          exit 1
        fi

        touch "$marker_file"
        chmod 600 "$marker_file"

        old_keys_tmp='{{.TMP_DIR}}/age-old-keys.txt'
        new_admin_key='{{.TMP_DIR}}/admin.key.new'
        new_admin_pub='{{.TMP_DIR}}/admin.pub.new'
        new_recovery_key='{{.TMP_DIR}}/recovery.key.new'
        new_recovery_pub='{{.TMP_DIR}}/recovery.pub.new'
        new_keys_tmp='{{.TMP_DIR}}/age-new-keys.txt'

        cleanup_success=0
        cleanup() {
          rm -f "$old_keys_tmp" "$new_admin_key" "$new_admin_pub" "$new_recovery_key" "$new_recovery_pub" "$new_keys_tmp"
          if [ "$cleanup_success" -eq 1 ]; then
            rm -f "$marker_file"
          fi
        }
        trap cleanup EXIT

        mkdir -p "$archive_dir"

        for file in '{{.AGE_ADMIN_KEY}}' '{{.AGE_ADMIN_PUB}}' '{{.AGE_RECOVERY_KEY}}' '{{.AGE_RECOVERY_PUB}}' '{{.AGE_KEYS_FILE}}'; do
          if [ -f "$file" ]; then
            cp "$file" "$archive_dir/$(basename "$file")"
          fi
        done

        cp '{{.AGE_KEYS_FILE}}' "$old_keys_tmp"
        chmod 600 "$old_keys_tmp"

        age-keygen -o "$new_admin_key" >/dev/null
        age-keygen -y "$new_admin_key" > "$new_admin_pub"
        age-keygen -o "$new_recovery_key" >/dev/null
        age-keygen -y "$new_recovery_key" > "$new_recovery_pub"
        cat "$new_admin_key" "$new_recovery_key" > "$new_keys_tmp"

        chmod 600 "$new_admin_key" "$new_recovery_key" "$new_keys_tmp"
        chmod 644 "$new_admin_pub" "$new_recovery_pub"

        admin="$(cat "$new_admin_pub")"
        recovery="$(cat "$new_recovery_pub")"
        cat > '{{.SOPS_CONFIG_FILE}}' <<EOF
        # ================================================================
        # File: .sops.yaml
        # Purpose:
        #   SOPS creation rules for secrets stored under state/secrets.
        # ================================================================
        creation_rules:
          - path_regex: ^(.*/)?state/secrets/.*\.(ya?ml|json|env|ini|txt|conf)$
            age: >-
              ${admin},${recovery}
        EOF

        candidate_list='{{.TMP_DIR}}/sops-rekey-candidates.txt'
        find '{{.SECRETS_DIR}}' -type f \( -name '*.yaml' -o -name '*.yml' -o -name '*.json' -o -name '*.env' -o -name '*.ini' -o -name '*.txt' -o -name '*.conf' \) | sort > "$candidate_list"

        while IFS= read -r file; do
          [ -n "$file" ] || continue
          if grep -Eq '^[[:space:]]*sops:|"sops"[[:space:]]*:' "$file"; then
            SOPS_AGE_KEY_FILE="$old_keys_tmp" sops updatekeys -y "$file" >/dev/null
          fi
        done < "$candidate_list"

        install -m 600 "$new_admin_key" '{{.AGE_ADMIN_KEY}}'
        install -m 644 "$new_admin_pub" '{{.AGE_ADMIN_PUB}}'
        install -m 600 "$new_recovery_key" '{{.AGE_RECOVERY_KEY}}'
        install -m 644 "$new_recovery_pub" '{{.AGE_RECOVERY_PUB}}'
        install -m 600 "$new_keys_tmp" '{{.AGE_KEYS_FILE}}'

        cleanup_success=1
      - task: age:show:recipients
      - task: report

  ops:renew:certs:
    desc: Renew the local OpenBao server certificate and validate the service
    deps: [backup:offline]
    cmds:
      - |
        set -eu
        rm -f '{{.OPENBAO_SERVER_CERT_FILE}}' '{{.OPENBAO_SERVER_KEY_FILE}}' '{{.OPENBAO_SERVER_TLS_DIR}}/server.csr.pem' '{{.OPENBAO_SERVER_TLS_DIR}}/server-openssl.cnf'
        rm -f '{{.OPENBAO_INSTALL_DIR}}/server.cert.pem' '{{.OPENBAO_INSTALL_DIR}}/server.key.pem'
      - task: openbao:tls:server:init
      - task: openbao:systemd:install
      - task: openbao:restart:validate
      - task: openbao:health
      - task: ops:audit
      - task: openbao:status

  ops:audit:
    desc: Produce a day-2 operational audit report
    cmds:
      - |
        # ================================================================
        # Task: ops:audit
        # Purpose:
        #   Capture a machine-readable audit record for day-2 operations.
        # ================================================================
        set -eu
        mkdir -p '{{.AUDIT_DIR}}'
        . '{{.OPENBAO_CLI_ENV_FILE}}'

        fragment_path="$(systemctl show -p FragmentPath --value '{{.OPENBAO_SYSTEMD_UNIT}}.service' 2>/dev/null || true)"
        active_state="$(systemctl is-active '{{.OPENBAO_SYSTEMD_UNIT}}.service' 2>/dev/null || echo inactive)"
        enabled_state="$(systemctl is-enabled '{{.OPENBAO_SYSTEMD_UNIT}}.service' 2>/dev/null || echo disabled)"
        bao_version="$(bao version 2>/dev/null | head -n 1 || true)"

        status_json="$(bao status -format=json 2>/dev/null || true)"
        printf '%s' "$status_json" | jq -e . >/dev/null 2>&1 || status_json='{}'

        health_json="$(curl --silent --show-error --fail --cacert '{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem' '{{.OPENBAO_ADDR}}/v1/sys/health?standbyok=true&perfstandbyok=true' 2>/dev/null || true)"
        printf '%s' "$health_json" | jq -e . >/dev/null 2>&1 || health_json='{}'

        cert_subject="$(openssl x509 -in '{{.OPENBAO_SERVER_CERT_FILE}}' -noout -subject 2>/dev/null | sed 's/^subject=//')"
        cert_issuer="$(openssl x509 -in '{{.OPENBAO_SERVER_CERT_FILE}}' -noout -issuer 2>/dev/null | sed 's/^issuer=//')"
        cert_not_after="$(openssl x509 -in '{{.OPENBAO_SERVER_CERT_FILE}}' -noout -enddate 2>/dev/null | sed 's/^notAfter=//')"
        ca_not_after="$(openssl x509 -in '{{.OPENBAO_CA_DIR}}/ca.cert.pem' -noout -enddate 2>/dev/null | sed 's/^notAfter=//')"

        jq -n \
          --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          --arg bao_version "$bao_version" \
          --arg fragment_path "$fragment_path" \
          --arg active_state "$active_state" \
          --arg enabled_state "$enabled_state" \
          --arg cert_subject "$cert_subject" \
          --arg cert_issuer "$cert_issuer" \
          --arg cert_not_after "$cert_not_after" \
          --arg ca_not_after "$ca_not_after" \
          --arg admin_recipient "$(cat '{{.AGE_ADMIN_PUB}}' 2>/dev/null || true)" \
          --arg recovery_recipient "$(cat '{{.AGE_RECOVERY_PUB}}' 2>/dev/null || true)" \
          --argjson status "$status_json" \
          --argjson health "$health_json" \
          '{generated_at: $generated_at, bao_version: $bao_version, systemd: {fragment_path: $fragment_path, active_state: $active_state, enabled_state: $enabled_state}, certificates: {server_subject: $cert_subject, server_issuer: $cert_issuer, server_not_after: $cert_not_after, ca_not_after: $ca_not_after}, recipients: {admin: $admin_recipient, recovery: $recovery_recipient}, openbao_status: $status, openbao_health: $health}' > '{{.OPENBAO_AUDIT_FILE}}'
        cp '{{.OPENBAO_AUDIT_FILE}}' '{{.OPENBAO_AUDIT_LATEST_FILE}}'
        chmod 600 '{{.OPENBAO_AUDIT_FILE}}' '{{.OPENBAO_AUDIT_LATEST_FILE}}'
        jq . '{{.OPENBAO_AUDIT_FILE}}'

  passwords:store:openbao:root:
    internal: true
    desc: Copy the saved OpenBao root token into the encrypted passwords env file
    preconditions:
      - sh: '[ -f "{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}" ]'
        msg: 'Encrypted root token not found. Initialise OpenBao first.'
    cmds:
      - |
        set -eu
        . '{{.TASK_HELPERS_FILE}}'
        token="$(SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}' | jq -r '.root_token')"
        encrypted_dotenv_upsert OPENBAO_ROOT_TOKEN "$token" '{{.PASSWORDS_ENC_ENV_FILE}}' '{{.AGE_KEYS_FILE}}' '{{.PASSWORDS_ENC_ENV_FILE_REL}}'

  passwords:store:openbao:transit:
    internal: true
    desc: Copy the saved OpenBao transit token into the encrypted passwords env file
    preconditions:
      - sh: '[ -f "{{.OPENBAO_TRANSIT_BOOTSTRAP_ENC_FILE}}" ]'
        msg: 'Encrypted transit bootstrap artefact not found.'
    cmds:
      - |
        set -eu
        . '{{.TASK_HELPERS_FILE}}'
        token="$(SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.OPENBAO_TRANSIT_BOOTSTRAP_ENC_FILE}}' | jq -r '.token')"
        encrypted_dotenv_upsert OPENBAO_TRANSIT_AUTOUNSEAL_TOKEN "$token" '{{.PASSWORDS_ENC_ENV_FILE}}' '{{.AGE_KEYS_FILE}}' '{{.PASSWORDS_ENC_ENV_FILE_REL}}'
        
  env:runtime:render:
    desc: Decrypt the managed passwords env into a local runtime-only plaintext file
    preconditions:
      - sh: '[ -f "{{.PASSWORDS_ENC_ENV_FILE}}" ]'
        msg: 'Encrypted passwords env file not found.'
      - sh: '[ -f "{{.AGE_KEYS_FILE}}" ]'
        msg: 'Age identities not found.'
    cmds:
      - |
        set -eu
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.PASSWORDS_ENC_ENV_FILE}}' > '{{.PASSWORDS_RUNTIME_ENV_FILE}}'
        chmod 600 '{{.PASSWORDS_RUNTIME_ENV_FILE}}'

  env:runtime:clean:
    desc: Remove the local decrypted runtime passwords env
    cmds:
      - |
        set -eu
        rm -f '{{.PASSWORDS_RUNTIME_ENV_FILE}}'

  secret:file:path:
    internal: true
    desc: Resolve a secret group to its encrypted file path
    cmds:
      - |
        set -eu
        group='{{.SECRET_GROUP}}'
        case "$group" in
          passwords) printf '%s\n' '{{.PASSWORDS_ENC_ENV_FILE}}' ;;
          *) printf '%s\n' '{{.SECRETS_DIR}}/%s/%s.enc.yaml\n' "$group" "$group" ;;
        esac

  secret:create:
    desc: Create a new secret entry in an encrypted file
    preconditions:
      - sh: '[ -n "{{.SECRET_GROUP}}" ]'
        msg: 'Provide SECRET_GROUP=<group>'
      - sh: '[ -n "{{.SECRET_KEY}}" ]'
        msg: 'Provide SECRET_KEY=<key>'
      - sh: '[ -n "{{.SECRET_VALUE}}" ]'
        msg: 'Provide SECRET_VALUE=<value>'
    cmds:
      - task: secret:update
        vars:
          SECRET_GROUP: '{{.SECRET_GROUP}}'
          SECRET_KEY: '{{.SECRET_KEY}}'
          SECRET_VALUE: '{{.SECRET_VALUE}}'

  secret:update:
    desc: Add or update a secret in an encrypted file
    preconditions:
      - sh: '[ -n "{{.SECRET_GROUP}}" ]'
        msg: 'Provide SECRET_GROUP=<group>'
      - sh: '[ -n "{{.SECRET_KEY}}" ]'
        msg: 'Provide SECRET_KEY=<key>'
      - sh: '[ -n "{{.SECRET_VALUE}}" ]'
        msg: 'Provide SECRET_VALUE=<value>'
    cmds:
      - |
        # ================================================================
        # Task: secret:update
        # Purpose:
        #   Upsert a secret into the appropriate encrypted group file.
        # Notes:
        #   - passwords group is managed as dotenv
        #   - other groups are managed as YAML key/value maps
        # ================================================================
        set -eu
        . '{{.TASK_HELPERS_FILE}}'

        group='{{.SECRET_GROUP}}'
        key='{{.SECRET_KEY}}'
        value='{{.SECRET_VALUE}}'

        if [ "$group" = 'passwords' ]; then
          encrypted_dotenv_upsert "$key" "$value" '{{.PASSWORDS_ENC_ENV_FILE}}' '{{.AGE_KEYS_FILE}}' '{{.PASSWORDS_ENC_ENV_FILE_REL}}'
        else
          target_dir='{{.SECRETS_DIR}}/'"$group"
          target_file="${target_dir}/${group}.enc.yaml"
          mkdir -p "$target_dir"

          tmp_plain='{{.TMP_DIR}}/secret-group.yaml'
          trap 'rm -f "$tmp_plain"' EXIT

          if [ -f "$target_file" ]; then
            SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt "$target_file" > "$tmp_plain"
          else
            printf '{}\n' > "$tmp_plain"
          fi

          if yq --version >/dev/null 2>&1; then
            yq -i ".${key} = \"${value}\"" "$tmp_plain"
          else
            jq -n --arg key "$key" --arg value "$value" '{($key): $value}' > '{{.TMP_DIR}}/secret-entry.json'
            python3 - "$tmp_plain" '{{.TMP_DIR}}/secret-entry.json' <<'PY'
            import sys
            import yaml
            import json

            plain_file = sys.argv[1]
            entry_file = sys.argv[2]

            with open(plain_file, 'r', encoding='utf-8') as f:
                data = yaml.safe_load(f) or {}

            with open(entry_file, 'r', encoding='utf-8') as f:
                entry = json.load(f)

            data.update(entry)

            with open(plain_file, 'w', encoding='utf-8') as f:
                yaml.safe_dump(data, f, sort_keys=True)
            PY
          fi

          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --filename-override "state/secrets/${group}/${group}.enc.yaml" --input-type yaml --output-type yaml "$tmp_plain" > "$target_file"
          chmod 600 "$target_file"
        fi

  secret:view:
    desc: View a specific secret from an encrypted file
    cmds:
      - |
        # ================================================================
        # Task: secret:view
        # Purpose:
        #   View a specific secret from an encrypted file.
        # Notes:
        #   - Prompts interactively for group and key when not provided.
        #   - Works for dotenv passwords and YAML group files.
        # ================================================================
        set -eu
        . '{{.TASK_HELPERS_FILE}}'

        group='{{.SECRET_GROUP}}'
        key='{{.SECRET_KEY}}'

        if [ -z "$group" ]; then
          groups_tmp='{{.TMP_DIR}}/secret-groups.txt'
          trap 'rm -f "$groups_tmp" "$keys_tmp"' EXIT
          mkdir -p '{{.TMP_DIR}}'

          {
            if [ -f '{{.PASSWORDS_ENC_ENV_FILE}}' ]; then
              echo 'passwords'
            fi
            find '{{.SECRETS_DIR}}' -mindepth 1 -maxdepth 1 -type d ! -name '.tmp' ! -name 'age' ! -name 'openbao' ! -name 'sops' ! -name 'backups' ! -name 'dr' ! -name 'audit' -printf '%f\n' 2>/dev/null || true
          } | awk 'NF > 0 && !seen[$0]++' | sort > "$groups_tmp"

          if [ ! -s "$groups_tmp" ]; then
            echo 'No secret groups found.' >&2
            exit 1
          fi

          echo 'Available secret groups:'
          nl -w2 -s'. ' "$groups_tmp"

          require_tty 'secret group selection'
          group_choice="$(tty_prompt 'Choose a group number: ')"

          group="$(awk -v n="$group_choice" 'NR == n {print; exit}' "$groups_tmp")"
          if [ -z "$group" ]; then
            echo 'Invalid group selection.' >&2
            exit 1
          fi
        fi

        keys_tmp='{{.TMP_DIR}}/secret-keys.txt'
        mkdir -p '{{.TMP_DIR}}'

        if [ "$group" = 'passwords' ]; then
          if [ -z "$key" ]; then
            SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.PASSWORDS_ENC_ENV_FILE}}' \
              | awk -F= 'NF >= 1 && $1 !~ /^#/ && $1 != "" {print $1}' \
              | sort > "$keys_tmp"

            if [ ! -s "$keys_tmp" ]; then
              echo 'No keys found in passwords group.' >&2
              exit 1
            fi

            echo "Available keys in ${group}:"
            nl -w2 -s'. ' "$keys_tmp"

            require_tty 'secret key selection'
            key_choice="$(tty_prompt 'Choose a key number: ')"

            key="$(awk -v n="$key_choice" 'NR == n {print; exit}' "$keys_tmp")"
            if [ -z "$key" ]; then
              echo 'Invalid key selection.' >&2
              exit 1
            fi
          fi

          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.PASSWORDS_ENC_ENV_FILE}}' \
            | awk -F= -v wanted="$key" '$1 == wanted {print $0; found=1} END {exit(found ? 0 : 1)}'
        else
          target_file='{{.SECRETS_DIR}}/'"$group"'/'"$group"'.enc.yaml'
          if [ ! -f "$target_file" ]; then
            echo "Secret group file not found: $target_file" >&2
            exit 1
          fi

          if [ -z "$key" ]; then
            SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt "$target_file" \
              | awk -F: '/^[A-Za-z0-9_.-]+:/ {print $1}' \
              | sort > "$keys_tmp"

            if [ ! -s "$keys_tmp" ]; then
              echo "No keys found in ${group}." >&2
              exit 1
            fi

            echo "Available keys in ${group}:"
            nl -w2 -s'. ' "$keys_tmp"

            require_tty 'secret key selection'
            key_choice="$(tty_prompt 'Choose a key number: ')"

            key="$(awk -v n="$key_choice" 'NR == n {print; exit}' "$keys_tmp")"
            if [ -z "$key" ]; then
              echo 'Invalid key selection.' >&2
              exit 1
            fi
          fi

          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt "$target_file" \
            | awk -F': ' -v wanted="$key" '$1 == wanted {print $0; found=1} END {exit(found ? 0 : 1)}'
        fi

  view:group:
    desc: View all secrets in a specific group
    cmds:
      - |
        # ================================================================
        # Task: view:group
        # Purpose:
        #   View all secrets in a specific group.
        # Notes:
        #   - Prompts interactively for group when not provided.
        # ================================================================
        set -eu

        group='{{.SECRET_GROUP}}'

        if [ -z "$group" ]; then
          groups_tmp='{{.TMP_DIR}}/secret-groups.txt'
          trap 'rm -f "$groups_tmp"' EXIT
          mkdir -p '{{.TMP_DIR}}'

          {
            if [ -f '{{.PASSWORDS_ENC_ENV_FILE}}' ]; then
              echo 'passwords'
            fi
            find '{{.SECRETS_DIR}}' -mindepth 1 -maxdepth 1 -type d ! -name '.tmp' ! -name 'age' ! -name 'openbao' ! -name 'sops' ! -name 'backups' ! -name 'dr' ! -name 'audit' -printf '%f\n' 2>/dev/null || true
          } | awk 'NF > 0 && !seen[$0]++' | sort > "$groups_tmp"

          if [ ! -s "$groups_tmp" ]; then
            echo 'No secret groups found.' >&2
            exit 1
          fi

          echo 'Available secret groups:'
          nl -w2 -s'. ' "$groups_tmp"

          require_tty 'secret group selection'
          group_choice="$(tty_prompt 'Choose a group number: ')"

          group="$(awk -v n="$group_choice" 'NR == n {print; exit}' "$groups_tmp")"
          if [ -z "$group" ]; then
            echo 'Invalid group selection.' >&2
            exit 1
          fi
        fi

        if [ "$group" = 'passwords' ]; then
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.PASSWORDS_ENC_ENV_FILE}}'
        else
          target_file='{{.SECRETS_DIR}}/'"$group"'/'"$group"'.enc.yaml'
          [ -f "$target_file" ]
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt "$target_file"
        fi

  view:all:
    desc: List all encrypted secret files by group
    cmds:
      - |
        set -eu
        echo '--- secret groups ---'
        find '{{.SECRETS_DIR}}' -type f \( -name '*.enc.env' -o -name '*.enc.yaml' -o -name '*.enc.yml' -o -name '*.enc.json' \) | sort || true

  edit:
    desc: Edit an encrypted secrets file directly with SOPS
    cmds:
      - |
        # ================================================================
        # Task: edit
        # Purpose:
        #   Edit an encrypted secrets file directly with SOPS.
        # Notes:
        #   - Prompts interactively when FILE is not provided.
        #   - Uses the same operator-facing groups as view:group and view:all.
        #   - Hides system/bootstrap areas from the picker.
        #   - Treats SOPS exit code 200 as "no changes made", not failure.
        # ================================================================
        set -eu
        . '{{.TASK_HELPERS_FILE}}'

        file='{{.FILE}}'
        mkdir -p '{{.TMP_DIR}}'

        groups_tmp='{{.TMP_DIR}}/secret-groups.txt'
        files_tmp='{{.TMP_DIR}}/secret-files.txt'
        trap 'rm -f "$groups_tmp" "$files_tmp"' EXIT

        if [ -z "$file" ]; then
          {
            if [ -f '{{.PASSWORDS_ENC_ENV_FILE}}' ]; then
              echo 'passwords'
            fi

            find '{{.SECRETS_DIR}}' \
              -mindepth 1 \
              -maxdepth 1 \
              -type d \
              ! -name '.tmp' \
              ! -name 'age' \
              ! -name 'openbao' \
              ! -name 'sops' \
              ! -name 'backups' \
              ! -name 'dr' \
              ! -name 'audit' \
              -printf '%f\n' 2>/dev/null || true
          } | awk 'NF > 0 && !seen[$0]++' | sort > "$groups_tmp"

          if [ ! -s "$groups_tmp" ]; then
            echo 'No operator-facing secret groups found.' >&2
            exit 1
          fi

          echo 'Available secret groups:'
          nl -w2 -s'. ' "$groups_tmp"

          require_tty 'secret group selection'
          group_choice="$(tty_prompt 'Choose a group number: ')"

          group="$(awk -v n="$group_choice" 'NR == n {print; exit}' "$groups_tmp")"
          if [ -z "$group" ]; then
            echo 'Invalid group selection.' >&2
            exit 1
          fi

          if [ "$group" = 'passwords' ]; then
            printf '%s\n' '{{.PASSWORDS_ENC_ENV_FILE}}' > "$files_tmp"
          else
            find '{{.SECRETS_DIR}}/'"$group" \
              -maxdepth 1 \
              -type f \
              \( -name '*.enc.env' -o -name '*.enc.yaml' -o -name '*.enc.yml' -o -name '*.enc.json' \) \
              | sort > "$files_tmp"
          fi

          if [ ! -s "$files_tmp" ]; then
            echo "No editable encrypted files found in group: $group" >&2
            exit 1
          fi

          echo "Available files in ${group}:"
          nl -w2 -s'. ' "$files_tmp"

          require_tty 'secret file selection'
          file_choice="$(tty_prompt 'Choose a file number: ')"

          file="$(awk -v n="$file_choice" 'NR == n {print; exit}' "$files_tmp")"
          if [ -z "$file" ]; then
            echo 'Invalid file selection.' >&2
            exit 1
          fi
        fi

        if [ ! -f "$file" ]; then
          echo "The requested file does not exist: $file" >&2
          exit 1
        fi

        editor_value="$(get_env_value '{{.CONFIG_ENV_FILE}}' SECRETS_EDITOR || true)"

        if [ -n "$editor_value" ]; then
          set +e
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' SOPS_EDITOR="$editor_value" sops "$file"
          sops_rc=$?
          set -e
        else
          set +e
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops "$file"
          sops_rc=$?
          set -e
        fi

        case "$sops_rc" in
          0)
            ;;
          200)
            echo 'No changes were made.'
            ;;
          *)
            exit "$sops_rc"
            ;;
        esac

  validate:
    desc: Validate encrypted secret state and reconcile known managed secrets
    cmds:
      - |
        set -eu

        helpers_file='{{.TASK_HELPERS_FILE}}'
        passwords_enc_file='{{.PASSWORDS_ENC_ENV_FILE}}'
        age_keys_file='{{.AGE_KEYS_FILE}}'
        code_server_config_file="${HOME}/.config/code-server/config.yaml"

        [ -f "$helpers_file" ]
        [ -f "$passwords_enc_file" ]
        [ -f "$age_keys_file" ]

        . "$helpers_file"

        if [ -f '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}' ] && command -v jq >/dev/null 2>&1; then
          token="$(SOPS_AGE_KEY_FILE="$age_keys_file" sops --decrypt '{{.OPENBAO_ROOT_TOKEN_ENC_FILE}}' | jq -r '.root_token // empty')"
          if [ -n "$token" ]; then
            encrypted_dotenv_upsert OPENBAO_ROOT_TOKEN "$token" "$passwords_enc_file" "$age_keys_file" '{{.PASSWORDS_ENC_ENV_FILE_REL}}'
          fi
        fi

        if [ -f '{{.OPENBAO_TRANSIT_BOOTSTRAP_ENC_FILE}}' ] && command -v jq >/dev/null 2>&1; then
          token="$(SOPS_AGE_KEY_FILE="$age_keys_file" sops --decrypt '{{.OPENBAO_TRANSIT_BOOTSTRAP_ENC_FILE}}' | jq -r '.token // empty')"
          if [ -n "$token" ]; then
            encrypted_dotenv_upsert OPENBAO_TRANSIT_AUTOUNSEAL_TOKEN "$token" "$passwords_enc_file" "$age_keys_file" '{{.PASSWORDS_ENC_ENV_FILE_REL}}'
          fi
        fi

  editor:select:
    desc: Choose the editor used for secrets editing
    cmds:
      - |
        # ================================================================
        # Task: editor:select
        # Purpose:
        #   Let the operator choose which editor SOPS should use.
        #
        # Notes:
        #   - Saves the chosen editor into state/config/.env as
        #     SECRETS_EDITOR.
        #   - Supports nano, vi, vim, and current environment editor
        #     values.
        #   - If SECRETS_EDITOR is already configured, the task exits
        #     cleanly without prompting.
        # ================================================================
        set -eu
        . '{{.TASK_HELPERS_FILE}}'

        existing_editor="$(get_env_value '{{.CONFIG_ENV_FILE}}' SECRETS_EDITOR || true)"
        if [ -n "$existing_editor" ]; then
          printf 'Secrets editor already set to: %s\n' "$existing_editor"
          exit 0
        fi

        if [ "{{.NONINTERACTIVE}}" = "1" ]; then
          ensure_env_key_value '{{.CONFIG_ENV_FILE}}' SECRETS_EDITOR 'nano'
          echo 'Secrets editor set to: nano'
          exit 0
        fi

        mkdir -p '{{.TMP_DIR}}'
        options_file='{{.TMP_DIR}}/editor-options.txt'
        trap 'rm -f "$options_file"' EXIT

        {
          echo 'nano'
          echo 'vi'
          echo 'vim'

          if [ -n "${SOPS_EDITOR:-}" ]; then
            printf '%s\n' "$SOPS_EDITOR"
          fi

          if [ -n "${EDITOR:-}" ]; then
            printf '%s\n' "$EDITOR"
          fi

          if [ -n "${VISUAL:-}" ]; then
            printf '%s\n' "$VISUAL"
          fi
        } | awk 'NF > 0 && !seen[$0]++' > "$options_file"

        echo 'Available editors:'
        nl -w2 -s'. ' "$options_file"

        printf 'Choose an editor number: ' >&2
        IFS= read -r choice

        selected_editor="$(awk -v n="$choice" 'NR == n {print; exit}' "$options_file")"
        if [ -z "$selected_editor" ]; then
          echo 'Invalid editor selection.' >&2
          exit 1
        fi

        ensure_env_key_value '{{.CONFIG_ENV_FILE}}' SECRETS_EDITOR "$selected_editor"
        printf 'Secrets editor set to: %s\n' "$selected_editor"

  openbao:bootstrap:standalone:
    internal: true
    desc: End-to-end standalone OpenBao bootstrap with TLS, Raft, encrypted recovery, and baseline engines
    deps: [openbao:prepare:runtime]
    cmds:
      - task: openbao:start
      - task: openbao:init
      - task: openbao:unseal
      - task: openbao:secrets:enable
      - task: openbao:transit:prepare-autounseal
      - task: openbao:bootstrap:status

  clean:tmp:
    internal: true
    desc: Remove temporary plaintext working files
    cmds:
      - |
        set -eu
        mkdir -p '{{.TMP_DIR}}'
        find '{{.TMP_DIR}}' -mindepth 1 -maxdepth 1 -type f -exec rm -f {} +

  destroy:
    desc: Remove the deployed secrets runtime and local secrets state
    preconditions:
      - sh: '[ "{{.CONFIRM_DESTROY}}" = "true" ]'
        msg: 'Destructive action blocked. Re-run with CONFIRM_DESTROY=true.'
    cmds:
      - |
        # ================================================================
        # Task: destroy
        # Purpose:
        #   Remove the deployed secrets runtime and local secrets state.
        # ================================================================
        set -eu

        if [ '{{.TAKE_BACKUP_BEFORE_DESTROY}}' = 'true' ] && [ -d '{{.SECRETS_DIR}}' ]; then
          echo 'Checking for recoverable artefacts before destroy'
          task --taskfile '{{.TASKFILE}}' backup:offline || true
        else
          echo 'Skipping pre-destroy backup'
        fi

        if command -v systemctl >/dev/null 2>&1; then
          sudo systemctl stop '{{.OPENBAO_SYSTEMD_UNIT}}.service' >/dev/null 2>&1 || true
          sudo systemctl disable '{{.OPENBAO_SYSTEMD_UNIT}}.service' >/dev/null 2>&1 || true
          sudo systemctl daemon-reload >/dev/null 2>&1 || true
          sudo systemctl reset-failed '{{.OPENBAO_SYSTEMD_UNIT}}.service' >/dev/null 2>&1 || true
        fi

        sudo rm -f '{{.OPENBAO_SYSTEMD_INSTALLED_FILE}}'
        sudo rm -rf '{{.OPENBAO_INSTALL_DIR}}'
        sudo rm -rf '{{.OPENBAO_INSTALL_TLS_LINK}}'
        sudo rm -rf '{{.OPENBAO_RUNTIME_SYSTEM_DIR}}'

        rm -f '{{.SOPS_CONFIG_FILE}}'
        rm -rf '{{.SECRETS_DIR}}'

        if id openbao >/dev/null 2>&1; then
          sudo userdel openbao >/dev/null 2>&1 || true
        fi
        if getent group openbao >/dev/null 2>&1; then
          sudo groupdel openbao >/dev/null 2>&1 || true
        fi

        if command -v systemctl >/dev/null 2>&1; then
          sudo systemctl daemon-reload >/dev/null 2>&1 || true
        fi

        echo '--- Secrets runtime and local secrets state removed successfully ---'

  purge:
    desc: Remove the full secrets stack including packages and state
    preconditions:
      - sh: '[ "{{.CONFIRM_DESTROY}}" = "true" ]'
        msg: 'Destructive action blocked. Re-run with CONFIRM_DESTROY=true.'
    cmds:
      - task: destroy
        vars:
          CONFIRM_DESTROY: 'true'
          TAKE_BACKUP_BEFORE_DESTROY: 'true'
      - |
        # ================================================================
        # Task: purge
        # Purpose:
        #   Remove packages and any remaining local secrets tooling.
        # ================================================================
        set -eu

        if [ '{{.PURGE_PACKAGES}}' = 'true' ] && command -v apt-get >/dev/null 2>&1; then
          echo 'Purging packages: openbao sops age'
          sudo apt-get purge -y openbao sops age >/dev/null 2>&1 || true
          sudo apt-get autoremove -y >/dev/null 2>&1 || true
        else
          echo 'Skipping package purge'
        fi

        echo '--- Full secrets stack purge completed successfully ---'

  report:
    desc: Print a concise status report for the secrets standard
    cmds:
      - |
        # ================================================================
        # Task: report
        # Purpose:
        #   Print a concise status summary for local secrets tooling,
        #   encrypted state, and OpenBao bootstrap readiness.
        #
        # Notes:
        #   - Avoids printing the full state/config/.env file because that
        #     is noisy during routine bootstrap runs.
        # ================================================================
        set -eu
        . '{{.TASK_HELPERS_FILE}}'

        config_env_file='{{.CONFIG_ENV_FILE}}'
        secrets_editor=''
        operator_name=''
        operator_email=''

        if [ -f "$config_env_file" ]; then
          secrets_editor="$(get_env_value "$config_env_file" SECRETS_EDITOR || true)"
          operator_name="$(get_env_value "$config_env_file" OPERATOR_NAME || true)"
          operator_email="$(get_env_value "$config_env_file" OPERATOR_EMAIL || true)"
        fi

        secret_count="$(
          find '{{.SECRETS_DIR}}' -type f \
            \( -name '*.enc.env' -o -name '*.enc.yaml' -o -name '*.enc.yml' -o -name '*.enc.json' \) \
            | wc -l | tr -d ' '
        )"

        echo '--- operator ---'
        [ -f "$config_env_file" ] && echo "config env: present ($config_env_file)" || echo 'config env: missing'
        [ -n "$operator_name" ] && echo "operator name: $operator_name" || echo 'operator name: missing'
        [ -n "$operator_email" ] && echo "operator email: $operator_email" || echo 'operator email: missing'
        [ -n "$secrets_editor" ] && echo "secrets editor: $secrets_editor" || echo 'secrets editor: not set'

        echo '--- age ---'
        [ -f '{{.AGE_ADMIN_KEY}}' ] && echo 'admin key: present' || echo 'admin key: missing'
        [ -f '{{.AGE_RECOVERY_KEY}}' ] && echo 'recovery key: present' || echo 'recovery key: missing'

        echo '--- sops ---'
        [ -f '{{.SOPS_CONFIG_FILE}}' ] && echo '.sops.yaml: present' || echo '.sops.yaml: missing'

        echo '--- encrypted secret files ---'
        echo "count: $secret_count"

        echo '--- openbao ---'
        [ -f '{{.OPENBAO_INIT_ENC_FILE}}' ] && echo 'bootstrap: initialised' || echo 'bootstrap: not initialised'