# ==============================================================================
# File: taskfile/router.Taskfile.yml
# Purpose:
#   router domain entrypoints for the homelab repository.
# Notes:
#   - This file preserves the production structure and is ready for domain-specific tasks.
#   - No destructive action is implemented without explicit future configuration.
# ==============================================================================

version: '3'

silent: true

tasks:
  help:
    desc: Show router tasks
    cmds:
      - |
        cat <<'HELP'
        router tasks:
          task router:help
          task router:report
        HELP

  report:
    desc: Show router domain status
    cmds:
      - echo 'router domain scaffold is present. Add configured tasks when variables are defined.'
