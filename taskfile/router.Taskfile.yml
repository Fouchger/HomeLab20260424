# ==============================================================================
# File: taskfile/router.Taskfile.yml
# Purpose:
#   Router domain entrypoints for the homelab repository.
# Notes:
#   - MikroTik backups are implemented through Ansible and community.routeros.
#   - Backups include secrets and are stored under state/mikrotik, which is ignored by Git.
# ==============================================================================

version: '3'

silent: true

vars:
  MIKROTIK_NAME: '{{.MIKROTIK_NAME | default "hap-ax2"}}'
  MIKROTIK_PORT: '{{.MIKROTIK_PORT | default "22"}}'
  MIKROTIK_HOST_KEY_CHECKING: '{{.MIKROTIK_HOST_KEY_CHECKING | default "false"}}'

tasks:
  help:
    desc: Show router tasks
    cmds:
      - |
        cat <<'HELP'
        router tasks:
          task router:help
          task router:deps        -> Alias for task ansible:collections
          task router:backup
          task router:report

        MikroTik backup example:
          MIKROTIK_HOST='192.168.88.1' \
          MIKROTIK_USER='admin' \
          MIKROTIK_PASSWORD='your-router-password' \
          task router:backup

        Backup output:
          state/mikrotik/YYYYMMDD-HHMM/<router-name>.rsc
        HELP

  deps:
    desc: Install Ansible collections required for MikroTik RouterOS automation
    cmds:
      - task: ansible:collections

  backup:
    desc: Back up MikroTik RouterOS configuration including sensitive values
    deps: [deps]
    cmds:
      - |
        . '{{.TASK_HELPERS_FILE}}'
        ansible_playbook_cmd="$(resolve_command_path ansible-playbook)"
        set -eu

        : "${MIKROTIK_HOST:?Set MIKROTIK_HOST to the router IP or DNS name.}"
        : "${MIKROTIK_USER:?Set MIKROTIK_USER to the RouterOS SSH username.}"
        : "${MIKROTIK_PASSWORD:?Set MIKROTIK_PASSWORD to the RouterOS SSH password.}"

        mkdir -p '{{.ROOT_DIR}}/state/tmp' '{{.ROOT_DIR}}/state/mikrotik'
        chmod 700 '{{.ROOT_DIR}}/state/tmp' '{{.ROOT_DIR}}/state/mikrotik'

        backup_stamp="$(date +%Y%m%d-%H%M)"
        inventory_file='{{.ROOT_DIR}}/state/tmp/mikrotik-inventory.yml'

        cleanup() {
          rm -f "$inventory_file"
        }
        trap cleanup EXIT INT TERM

        umask 077
        cat > "$inventory_file" <<EOF_INVENTORY
        ---
        # ==============================================================================
        # File: state/tmp/mikrotik-inventory.yml
        # Purpose:
        #   Temporary Ansible inventory for a single MikroTik backup run.
        # Notes:
        #   - Generated by task router:backup.
        #   - Removed automatically after the run.
        # ==============================================================================
        all:
          children:
            mikrotik:
              hosts:
                {{.MIKROTIK_NAME}}:
                  ansible_host: ${MIKROTIK_HOST}
                  ansible_user: ${MIKROTIK_USER}
                  ansible_password: ${MIKROTIK_PASSWORD}
                  ansible_port: {{.MIKROTIK_PORT}}
                  ansible_connection: ansible.netcommon.network_cli
                  ansible_network_os: community.routeros.routeros
                  ansible_command_timeout: 60
        EOF_INVENTORY

        ANSIBLE_HOST_KEY_CHECKING='{{.MIKROTIK_HOST_KEY_CHECKING}}' \
        MIKROTIK_BACKUP_ROOT='{{.ROOT_DIR}}/state/mikrotik' \
        MIKROTIK_BACKUP_STAMP="$backup_stamp" \
          "${ansible_playbook_cmd}" \
            -i "$inventory_file" \
            '{{.ROOT_DIR}}/ansible/playbooks/mikrotik_backup.yml'

        echo "MikroTik backup folder: {{.ROOT_DIR}}/state/mikrotik/$backup_stamp"

  report:
    desc: Show router domain status
    cmds:
      - |
        set -eu
        echo 'Router domain status'
        echo "  Ansible requirements: {{.ROOT_DIR}}/ansible/collections/requirements.yml"
        echo "  MikroTik playbook:     {{.ROOT_DIR}}/ansible/playbooks/mikrotik_backup.yml"
        echo "  Backup directory:      {{.ROOT_DIR}}/state/mikrotik"
        if [ -d '{{.ROOT_DIR}}/state/mikrotik' ]; then
          find '{{.ROOT_DIR}}/state/mikrotik' -mindepth 1 -maxdepth 1 -type d | sort | tail -5 | sed 's#^#  Recent backup:       #'
        fi
