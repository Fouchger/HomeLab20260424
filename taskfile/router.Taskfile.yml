# ==============================================================================
# File: taskfile/router.Taskfile.yml
# Purpose:
#   Router domain entrypoints for the homelab repository.
# Notes:
#   - MikroTik backups are implemented through Ansible and community.routeros.
#   - Backups include secrets and are stored under state/mikrotik, which is ignored by Git.
#   - Runtime connection values are read from environment variables first, then
#     from the standard repo config/secrets files, prompting only when missing.
#   - Non-secret values are saved in state/config/.env.
#   - Router passwords are saved in the encrypted passwords env file.
# ==============================================================================

version: '3'

silent: true

vars:
  MIKROTIK_NAME: '{{.MIKROTIK_NAME | default "hap-ax2"}}'
  MIKROTIK_PORT: '{{.MIKROTIK_PORT | default "22"}}'
  MIKROTIK_HOST_KEY_CHECKING: '{{.MIKROTIK_HOST_KEY_CHECKING | default "false"}}'
  MIKROTIK_COMMAND_TIMEOUT: '{{.MIKROTIK_COMMAND_TIMEOUT | default "60"}}'
  MIKROTIK_INVENTORY_FILE: '{{.TMP_DIR}}/mikrotik-inventory.yml'

tasks:
  help:
    desc: Show router tasks
    cmds:
      - |
        cat <<'HELP'
        router tasks:
          task router:help
          task router:deps        -> Install RouterOS Ansible runtime dependencies
          task router:backup      -> Back up a MikroTik RouterOS export
          task router:render      -> Render desired RouterOS install script only
          task router:plan        -> Render and diff against live RouterOS export
          task router:apply       -> Apply complete managed RouterOS configuration
          task router:report      -> Show router-domain status

        MikroTik backup example:
          task router:backup

        MikroTik desired-state examples:
          task router:render      # creates sensitive and redacted generated scripts
          task router:plan        # exports live router and writes redacted + sensitive diffs
          task router:apply       # plans first, then requires typing APPLY <router-name> before import

        Multi-router example:
          MIKROTIK_ROUTERS=hap-ax2,lab-rtr task router:plan
          MIKROTIK_ROUTERS=hap-ax2,lab-rtr task router:apply

        Per-router variables use the router name uppercased with punctuation changed to underscores:
          MIKROTIK_HAP_AX2_HOST=192.168.20.1
          MIKROTIK_HAP_AX2_ROUTER_IDENTITY=RTR-MAIN


        The task prompts for missing values and saves them for future use:
          - state/config/.env stores MIKROTIK_HOST, MIKROTIK_USER, MIKROTIK_NAME,
            MIKROTIK_PORT, MIKROTIK_HOST_KEY_CHECKING, and MIKROTIK_COMMAND_TIMEOUT.
          - state/secrets/passwords/passwords.enc.env stores MIKROTIK_PASSWORD,
            common or per-router SSH/admin/WiFi secrets.

        Environment variables still override saved values for one-off runs.
        For protected automation only, ROUTER_APPLY_CONFIRM=APPLY_ALL bypasses per-host prompts.

        Backup output:
          state/mikrotik/YYYYMMDD-HHMM/<router-name>.rsc

        Desired-state output:
          state/mikrotik/generated/YYYYMMDD-HHMMSS/<router-name>-install.rsc
          state/mikrotik/generated/YYYYMMDD-HHMMSS/<router-name>-install.redacted.rsc
          state/mikrotik/generated/YYYYMMDD-HHMMSS/<router-name>-diff.redacted.patch
        HELP

  deps:
    desc: Install RouterOS Ansible runtime dependencies
    cmds:
      - task: :ansible:python-deps
      # - task: :ansible:collections

  backup:
    desc: Back up MikroTik RouterOS configuration including sensitive values
    deps:
      - :dirs:ensure
      - :ansible:python-deps
    cmds:
      - |
        set -eu
        . '{{.TASK_HELPERS_FILE}}'

        ansible_playbook_cmd="$(resolve_command_path ansible-playbook)"
        config_env_file='{{.CONFIG_ENV_FILE}}'
        passwords_enc_file='{{.PASSWORDS_ENC_ENV_FILE}}'
        passwords_enc_file_rel='{{.PASSWORDS_ENC_ENV_FILE_REL}}'
        age_keys_file='{{.AGE_KEYS_FILE}}'

        echo 'Step 1/5: Resolve MikroTik connection settings.'

        mikrotik_host="${MIKROTIK_HOST:-}"
        mikrotik_user="${MIKROTIK_USER:-}"
        mikrotik_password="${MIKROTIK_PASSWORD:-}"
        mikrotik_name="${MIKROTIK_NAME:-}"
        mikrotik_port="${MIKROTIK_PORT:-}"
        mikrotik_host_key_checking="${MIKROTIK_HOST_KEY_CHECKING:-}"
        mikrotik_command_timeout="${MIKROTIK_COMMAND_TIMEOUT:-}"

        if [ -z "$mikrotik_host" ]; then
          mikrotik_host="$(prompt_if_missing_env_key "$config_env_file" MIKROTIK_HOST 'MikroTik host or IP: ')"
        else
          ensure_env_key_value "$config_env_file" MIKROTIK_HOST "$mikrotik_host"
        fi

        if [ -z "$mikrotik_user" ]; then
          mikrotik_user="$(prompt_if_missing_env_key "$config_env_file" MIKROTIK_USER 'MikroTik SSH username: ')"
        else
          ensure_env_key_value "$config_env_file" MIKROTIK_USER "$mikrotik_user"
        fi

        if [ -z "$mikrotik_password" ]; then
          mikrotik_password="$(prompt_if_missing_encrypted_env_key "$passwords_enc_file" MIKROTIK_PASSWORD 'MikroTik SSH password: ' "$age_keys_file" "$passwords_enc_file_rel")"
        else
          encrypted_dotenv_upsert MIKROTIK_PASSWORD "$mikrotik_password" "$passwords_enc_file" "$age_keys_file" "$passwords_enc_file_rel"
        fi

        if [ -z "$mikrotik_name" ]; then
          mikrotik_name="$(get_env_value "$config_env_file" MIKROTIK_NAME || true)"
        fi
        if [ -z "$mikrotik_name" ]; then
          mikrotik_name='{{.MIKROTIK_NAME}}'
        fi
        ensure_env_key_value "$config_env_file" MIKROTIK_NAME "$mikrotik_name"

        if [ -z "$mikrotik_port" ]; then
          mikrotik_port="$(get_env_value "$config_env_file" MIKROTIK_PORT || true)"
        fi
        if [ -z "$mikrotik_port" ]; then
          mikrotik_port='{{.MIKROTIK_PORT}}'
        fi
        ensure_env_key_value "$config_env_file" MIKROTIK_PORT "$mikrotik_port"

        if [ -z "$mikrotik_host_key_checking" ]; then
          mikrotik_host_key_checking="$(get_env_value "$config_env_file" MIKROTIK_HOST_KEY_CHECKING || true)"
        fi
        if [ -z "$mikrotik_host_key_checking" ]; then
          mikrotik_host_key_checking='{{.MIKROTIK_HOST_KEY_CHECKING}}'
        fi
        ensure_env_key_value "$config_env_file" MIKROTIK_HOST_KEY_CHECKING "$mikrotik_host_key_checking"

        if [ -z "$mikrotik_command_timeout" ]; then
          mikrotik_command_timeout="$(get_env_value "$config_env_file" MIKROTIK_COMMAND_TIMEOUT || true)"
        fi
        if [ -z "$mikrotik_command_timeout" ]; then
          mikrotik_command_timeout='{{.MIKROTIK_COMMAND_TIMEOUT}}'
        fi
        ensure_env_key_value "$config_env_file" MIKROTIK_COMMAND_TIMEOUT "$mikrotik_command_timeout"

        reject_multiline_value MIKROTIK_HOST "$mikrotik_host"
        reject_multiline_value MIKROTIK_USER "$mikrotik_user"
        reject_multiline_value MIKROTIK_PASSWORD "$mikrotik_password"
        reject_multiline_value MIKROTIK_NAME "$mikrotik_name"
        reject_multiline_value MIKROTIK_PORT "$mikrotik_port"
        reject_multiline_value MIKROTIK_HOST_KEY_CHECKING "$mikrotik_host_key_checking"
        reject_multiline_value MIKROTIK_COMMAND_TIMEOUT "$mikrotik_command_timeout"

        echo 'Step 2/5: Prepare temporary inventory and backup folders.'

        mkdir -p '{{.TMP_DIR}}' '{{.MIKROTIK_DIR}}'
        chmod 700 '{{.TMP_DIR}}' '{{.MIKROTIK_DIR}}'

        backup_stamp="$(date +%Y%m%d-%H%M)"
        inventory_file='{{.MIKROTIK_INVENTORY_FILE}}'

        cleanup_router_inventory() {
          rm -f "$inventory_file"
        }
        trap cleanup_router_inventory EXIT

        touch "$inventory_file"
        chmod 600 "$inventory_file"
        cat > "$inventory_file" <<EOF_INVENTORY
        ---
        # ==============================================================================
        # File: state/tmp/mikrotik-inventory.yml
        # Purpose:
        #   Temporary Ansible inventory for a single MikroTik backup run.
        # Notes:
        #   - Generated by task router:backup.
        #   - Removed automatically after the run.
        #   - Stored with mode 0600 while present because it includes connection secrets.
        # ==============================================================================
        all:
          children:
            mikrotik:
              hosts:
                $(yaml_single_quote_value "$mikrotik_name"):
                  ansible_host: $(yaml_single_quote_value "$mikrotik_host")
                  ansible_user: $(yaml_single_quote_value "$mikrotik_user")
                  ansible_password: $(yaml_single_quote_value "$mikrotik_password")
                  ansible_port: $(yaml_single_quote_value "$mikrotik_port")
                  ansible_connection: ansible.netcommon.network_cli
                  ansible_network_os: community.routeros.routeros
                  ansible_command_timeout: $(yaml_single_quote_value "$mikrotik_command_timeout")
        EOF_INVENTORY

        echo 'Step 3/5: Run the MikroTik Ansible backup playbook.'

        ANSIBLE_HOST_KEY_CHECKING="$mikrotik_host_key_checking" \
        MIKROTIK_BACKUP_ROOT='{{.MIKROTIK_DIR}}' \
        MIKROTIK_BACKUP_STAMP="$backup_stamp" \
          "$ansible_playbook_cmd" \
            -i "$inventory_file" \
            '{{.ROOT_DIR}}/ansible/playbooks/mikrotik_backup.yml'

        echo 'Step 4/5: Remove temporary inventory containing connection secrets.'
        cleanup_router_inventory
        trap - EXIT

        echo 'Step 5/5: MikroTik backup completed.'
        echo "MikroTik backup folder: {{.MIKROTIK_DIR}}/$backup_stamp"

  render:
    desc: Render MikroTik RouterOS desired-state install script without connecting for diff
    deps:
      - :dirs:ensure
      - :ansible:python-deps
      # - :ansible:collections
    cmds:
      - |
        set -euo pipefail
        ROOT_DIR='{{.ROOT_DIR}}' \
        CONFIG_ENV_FILE='{{.CONFIG_ENV_FILE}}' \
        PASSWORDS_ENC_ENV_FILE='{{.PASSWORDS_ENC_ENV_FILE}}' \
        PASSWORDS_ENC_ENV_FILE_REL='{{.PASSWORDS_ENC_ENV_FILE_REL}}' \
        AGE_KEYS_FILE='{{.AGE_KEYS_FILE}}' \
        TMP_DIR='{{.TMP_DIR}}' \
        MIKROTIK_DIR='{{.MIKROTIK_DIR}}' \
        TASK_HELPERS_FILE='{{.TASK_HELPERS_FILE}}' \
          '{{.ROOT_DIR}}/scripts/router/mikrotik-run.sh' render

  plan:
    desc: Render MikroTik config and compare it with the live RouterOS export
    deps:
      - :dirs:ensure
      - :ansible:python-deps
      # - :ansible:collections
    cmds:
      - |
        set -euo pipefail
        ROOT_DIR='{{.ROOT_DIR}}' \
        CONFIG_ENV_FILE='{{.CONFIG_ENV_FILE}}' \
        PASSWORDS_ENC_ENV_FILE='{{.PASSWORDS_ENC_ENV_FILE}}' \
        PASSWORDS_ENC_ENV_FILE_REL='{{.PASSWORDS_ENC_ENV_FILE_REL}}' \
        AGE_KEYS_FILE='{{.AGE_KEYS_FILE}}' \
        TMP_DIR='{{.TMP_DIR}}' \
        MIKROTIK_DIR='{{.MIKROTIK_DIR}}' \
        TASK_HELPERS_FILE='{{.TASK_HELPERS_FILE}}' \
          '{{.ROOT_DIR}}/scripts/router/mikrotik-run.sh' plan

  apply:
    desc: Apply complete MikroTik RouterOS desired state after post-plan confirmation
    deps:
      - :dirs:ensure
      - :ansible:python-deps
      # - :ansible:collections
    cmds:
      - |
        set -euo pipefail
        ROOT_DIR='{{.ROOT_DIR}}' \
        CONFIG_ENV_FILE='{{.CONFIG_ENV_FILE}}' \
        PASSWORDS_ENC_ENV_FILE='{{.PASSWORDS_ENC_ENV_FILE}}' \
        PASSWORDS_ENC_ENV_FILE_REL='{{.PASSWORDS_ENC_ENV_FILE_REL}}' \
        AGE_KEYS_FILE='{{.AGE_KEYS_FILE}}' \
        TMP_DIR='{{.TMP_DIR}}' \
        MIKROTIK_DIR='{{.MIKROTIK_DIR}}' \
        TASK_HELPERS_FILE='{{.TASK_HELPERS_FILE}}' \
          '{{.ROOT_DIR}}/scripts/router/mikrotik-run.sh' apply

  report:
    desc: Show router domain status
    cmds:
      - |
        set -eu
        echo 'Router domain status'
        echo "  Ansible requirements: {{.ROOT_DIR}}/ansible/collections/requirements.yml"
        echo "  MikroTik playbook:     {{.ROOT_DIR}}/ansible/playbooks/mikrotik_backup.yml"
        echo "  Config file:           {{.CONFIG_ENV_FILE}}"
        echo "  Encrypted secrets:     {{.PASSWORDS_ENC_ENV_FILE}}"
        echo "  Backup directory:      {{.MIKROTIK_DIR}}"
        if [ -d '{{.MIKROTIK_DIR}}' ]; then
          find '{{.MIKROTIK_DIR}}' -mindepth 1 -maxdepth 1 -type d | sort | tail -5 | sed 's#^#  Recent backup:       #'
        fi
