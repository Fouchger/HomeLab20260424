# ==============================================================================
# File: taskfile/dns.Taskfile.yml
# Purpose:
#   dns domain entrypoints for the homelab repository.
# Notes:
#   - This file preserves the production structure and is ready for domain-specific tasks.
#   - No destructive action is implemented without explicit future configuration.
# ==============================================================================

version: '3'

silent: true

tasks:
  help:
    desc: Show dns tasks
    cmds:
      - |
        cat <<'HELP'
        dns tasks:
          task dns:help
          task dns:report
        HELP

  report:
    desc: Show dns domain status
    cmds:
      - echo 'dns domain scaffold is present. Add configured tasks when variables are defined.'
