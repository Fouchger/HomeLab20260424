# ==============================================================================
# File: taskfile/network.Taskfile.yml
# Purpose:
#   network domain entrypoints for the homelab repository.
# Notes:
#   - This file preserves the production structure and is ready for domain-specific tasks.
#   - No destructive action is implemented without explicit future configuration.
# ==============================================================================

version: '3'

silent: true

tasks:
  help:
    desc: Show network tasks
    cmds:
      - |
        cat <<'HELP'
        network tasks:
          task network:help
          task network:report
        HELP

  report:
    desc: Show network domain status
    cmds:
      - echo 'network domain scaffold is present. Add configured tasks when variables are defined.'
