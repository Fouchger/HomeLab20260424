# ==============================================================================
# File: ansible.cfg
# Purpose:
#   Repository-local Ansible configuration for the HomeLab automation workspace.
# Notes:
#   - Keeps role and collection resolution anchored to this repository.
#   - Required for playbooks under ansible/playbooks/* to find ansible/roles/*.
# ==============================================================================

[defaults]
roles_path = ./ansible/roles
collections_path = ./ansible/collections:~/.ansible/collections:/usr/share/ansible/collections
retry_files_enabled = False
interpreter_python = auto_silent

[inventory]
enable_plugins = yaml, ini

[ssh_connection]
pipelining = True
