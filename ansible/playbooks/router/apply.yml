# ==============================================================================
# File: ansible/playbooks/router/apply.yml
# Purpose:
#   Render, diff or apply the MikroTik RouterOS desired state.
# Notes:
#   - Inventory and secrets are generated by task router:* into state/tmp.
#   - Default task flow renders only; apply requires explicit post-plan approval.
# ==============================================================================

- name: Manage MikroTik RouterOS desired state
  hosts: mikrotik
  gather_facts: false
  serial: "{{ lookup('env', 'MIKROTIK_APPLY_SERIAL') | default('1', true) }}"

  vars:
    mikrotik_router_output_dir: "{{ lookup('env', 'MIKROTIK_OUTPUT_DIR') | default(playbook_dir ~ '/../../../state/mikrotik/generated', true) }}"
    mikrotik_router_render_only: "{{ (lookup('env', 'MIKROTIK_RENDER_ONLY') | default('true', true)) | bool }}"
    mikrotik_router_apply_config: "{{ (lookup('env', 'MIKROTIK_APPLY_CONFIG') | default('false', true)) | bool }}"
    mikrotik_router_apply_confirmation: "{{ lookup('env', 'ROUTER_APPLY_CONFIRM') | default('', true) }}"
    mikrotik_router_expected_apply_confirmation: "APPLY {{ inventory_hostname }}"
    mikrotik_router_safe_mode: "{{ (lookup('env', 'MIKROTIK_SAFE_MODE') | default('false', true)) | bool }}"
    mikrotik_router_auto_rollback_on_failure: "{{ (lookup('env', 'MIKROTIK_AUTO_ROLLBACK_ON_FAILURE') | default('true', true)) | bool }}"
    mikrotik_router_apply_serial: "{{ lookup('env', 'MIKROTIK_APPLY_SERIAL') | default('1', true) }}"

  roles:
    - role: mikrotik_router
